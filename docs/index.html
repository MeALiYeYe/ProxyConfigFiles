<!DOCTYPE html>
<html>
<head>

</head>
<body>
<h1>Proxy Rules Statistics</h1>
<p>Last updated: Thu May  7 06:29:22 UTC 2026</p>
<canvas id="chart"></canvas>
<script>
const data = {

"Telegram/TelegramUS": {"total": 3, "domain": 0, "ip": 3},
"Telegram/TelegramEU": {"total": 11, "domain": 0, "ip": 11},
"Proxy/Proxy": {"total": 12, "domain": 12, "ip": 0},
"Direct/Direct": {"total": 21, "domain": 18, "ip": 3},
"anti-ip-attribution/anti-ip-attribution": {"total": 233, "domain": 103, "ip": 116},
"WebRTC/WebRTC": {"total": 28, "domain": 28, "ip": 0},
"Emby/Emby": {"total": 55, "domain": 52, "ip": 0},
"Reject/Reject": {"total": 93, "domain": 72, "ip": 18}};
const labels = Object.keys(data);
const totals = labels.map(k => data[k].total);
new Chart(document.getElementById('chart'), {
type: 'bar',
data: {
labels: labels,
datasets: [{
label: 'Total',
data: totals
}]
}
});
</script>
</body>
