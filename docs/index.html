<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Proxy Rules Stats</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body>
<h1>Proxy Rules Statistics</h1>
<p>Last updated: Fri May  8 08:01:49 UTC 2026</p>
<canvas id="chart"></canvas>
<script>
const data = {
"Direct": {"Direct": {"total": 21, "domain": 18, "ip": 3},
"Emby": {"Emby": {"total": 55, "domain": 52, "ip": 0},
"Proxy": {"Proxy": {"total": 12, "domain": 12, "ip": 0},
"Reject": {"Reject": {"total": 93, "domain": 72, "ip": 18},
"Telegram": {"TelegramEU": {"total": 11, "domain": 0, "ip": 11},
,
"TelegramSG": {"total": 5, "domain": 0, "ip": 5},
,
"TelegramUS": {"total": 3, "domain": 0, "ip": 3},
"WebRTC": {"WebRTC": {"total": 28, "domain": 28, "ip": 0},
"fakeip": {"fakeip": {"total": 233, "domain": 103, "ip": 116}};
const groups = Object.keys(data);
const datasets = [];
groups.forEach(group => {
  const items = data[group];
  const labels = Object.keys(items);
  datasets.push({
    label: group,
    data: labels.map(k => items[k].total)
  });
});
new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: Object.keys(data[groups[0]] || {}),
    datasets: datasets
  }
});
</script></body></html>
