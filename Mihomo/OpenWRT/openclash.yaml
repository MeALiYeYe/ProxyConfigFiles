  - {name: 低倍, icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/refs/heads/main/icon/05icon/liuliang(2).png", <<: *Smartp, include-all-providers: true, filter: *FilterLowMag}
  - {name: 高倍, icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/refs/heads/main/icon/05icon/liuliang(3).png", <<: *Smartp, include-all-providers: true, filter: *FilterHighMag}

