SubStoreUrl: &SubStoreUrl "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
BaiduUrl: &BaiduUrl "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/main/Mihomo/BaiduProxy.yaml"

# 延迟测试链接
ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"
DirecTest: &DirecTest "https://connect.rom.miui.com/generate_204"

# 过滤规则
FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|\bHK\b|Hong\s?Kong|HKG)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|\bTW\b|Taiwan|TWN)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|\bSG\b|Singapore|SGP)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|\bJP\b|Japan|JPN)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|\bUS\b|USA|States|America)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterEU: &FilterEU '(?i)(?:🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|\bHK\b|\bTW\b|\bSG\b|\bJP\b|\bUS\b))'
ExcludeFilter: &ExcludeFilter '(?i)(佣金|套餐|官网|官方|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|优惠|超实惠|址|AFF|Days|Date)'
FilterLow: &FilterLow '(?<!\d)0\.\d+'
FilterHigh: &FilterHigh '(?<![\d.])(?:[2-9]\d*\.\d+|1\.[1-9]\d*|(?:[xX×倍]\s*[2-9]\d*|[2-9]\d*\s*[xX×倍]))'

# 代理集和代理组
Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
#  override: 
#    dialer-proxy: Location

Smartp: &Smartp
  type: smart
  use:
    - SubStore
  policy-priority:
    - '(?<![\d.])0\.\d+(?!\d):2'
    - '(?<![\d.])1\.\d+(?!\d):0.5'
    - '(?<![\d.])[2-9]\d*(?:\.\\d+)?(?!\d):0.2'
  uselightgbm: true
  collectdata: false
  strategy: sticky-sessions
  max-failed-times: 3
  prefer-asn: true
  url: *ProxyTest
  hidden: true

Falld: &Falld
  type: fallback
  use: 
    - BaiduProxy
  url: *DirecTest
  interval: 3600
  lazy: true
  hidden: true

Groupp: &Groupp
  type: select
  proxies:
    - 直连
    - 香港
    - 台湾
    - 狮城
    - 日本
    - 美国
    - 低倍
    - 高倍
  url: *ProxyTest
  lazy: true
  hidden: false

Groupd: &Groupd
  type: select
  proxies:
    - 直连
    - 江苏
    - 广东
    - 北京
  url: *DirecTest
  lazy: true
  hidden: false

# 规则集
rule-anchor:
  cla: &cla
    type: http
    behavior: classical
    format: yaml
    interval: 86400
  dom: &dom
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400

proxies:
  - name: 直连
    type: direct
    udp: true

# 代理集
proxy-providers:
  SubStore:
    <<: *Proxyer
    path: ./proxies/SubStore.yaml
    url: *SubStoreUrl
  BaiduProxy:
    <<: *Proxyer
    path: ./proxies/BaiduProxy.yaml
    url: *BaiduUrl
    health-check:
      enable: false

# 代理组
