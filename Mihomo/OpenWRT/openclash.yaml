# 路由规则
rules:
  # FCM
  - DST-PORT,5228-5230,DIRECT
  # NTP
  - AND,((NETWORK,udp),(DST-PORT,123)),DIRECT
  # STUN
  - AND,((NETWORK,udp),(DST-PORT,3478-3479,5349,19302-19309)),REJECT-DROP
  - RULE-SET,myreject,REJECT
  - RULE-SET,mydirect,Domestic
  - RULE-SET,myproxy,Foreign
  - RULE-SET,emby,Emby
  - RULE-SET,awavenue,REJECT-DROP
  - RULE-SET,fakelocation,Location
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,ads-all,REJECT-DROP
  - RULE-SET,httpdns-cn,REJECT-DROP
  - RULE-SET,youtube,Youtube
  - RULE-SET,entertainment,Media
  - RULE-SET,telegram,Telegram
  - RULE-SET,telegram_ip,Telegram,no-resolve
  - RULE-SET,google,Google
  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,cloudflare,Cloudflare
  - RULE-SET,cloudflare_ip,Cloudflare,no-resolve
  - RULE-SET,ai-chat-!cn,Ai
  - RULE-SET,github,Github
  - RULE-SET,apple,Apple
  - RULE-SET,microsoft,Microsoft
  - RULE-SET,geolocation-!cn,Foreign
  - RULE-SET,cn,Domestic
  - RULE-SET,cn_ip,Domestic,no-resolve
  - MATCH,Final

#####################
########################## 全局通用配置 #########################
mixed-port: 7890
redir-port: 7892
tproxy-port: 1536
ipv6: true
mode: Rule
log-level: warning
unified-delay: true
tcp-concurrent: true
allow-lan: true

external-controller: 0.0.0.0:9090
external-ui: ./webroot/Zash/
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
secret: ""
skip-auth-prefixes:
  - 10.0.0.1/24
  - 127.0.0.1/32
  - 192.168.0.1/16

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 168
geox-url:
#  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
#  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
#  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"

# 策略组选择和fake-ip缓存
profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

# 域名嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 5228-5230
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.local"
    - "+.lan"
    - "localhost"
    - "Mijia Cloud"
    - "miwifi.com"

# Tunnel配置
tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# DNS配置
dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  respect-rules: false
  fake-ip-range: 198.18.0.0/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "localhost"
    - "+.ntp.org"
    - "+.pool.ntp.org"
    - "time.*.com"
  nameserver-policy:
    'RULE-SET:ads-all': rcode://name_error
    'RULE-SET:cn,apple,microsoft':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  direct-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - 'https://dns.google/dns-query#Google'
    - 'https://cloudflare-dns.com/dns-query#Cloudflare'

# hosts
hosts:
  raw.githubusercontent.com:
    - 185.199.108.133
    - 185.199.109.133
    - 185.199.110.133
    - 185.199.111.133
