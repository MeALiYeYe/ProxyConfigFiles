# 首选
Sub1: &Sub1 "TKV"
# 次选
Sub2: &Sub2 "花云"
# 备选
Sub3: &Sub3 "守候"
SubStoreUrl: &SubStoreUrl "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
BaiduUrl: &BaiduUrl "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/refs/heads/main/Mihomo/BaiduProxy.yaml"

ProxyTestUrl: &ProxyTestUrl "https://www.gstatic.com/generate_204"
DirectTestUrl: &DirectTestUrl "https://wifi.vivo.com.cn/generate_204"

FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|\bHK\b|Hong|HKG)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇨🇳|🇹🇼|\bTW\b|tai|TWN)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|\bSG\b|Singapore|SGP)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|\bJP\b|Japan|JPN)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|\bUS\b|USA|States)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterEU: &FilterEU '(?i)(?:🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|韩国|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|\bHK\b|\bTW\b|\bSG\b|\bJP\b|\bKR\b|\bUS\b))'
ExcludeFilter: &ExcludeFilter '(?i)(佣金|套餐|官网|官方|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|优惠|超实惠|址|AFF|Days|Date)'
FilterLowMag: &FilterLowMag '0\.\d+'
FilterHighMag: &FilterHighMag '(?!0\.)[1-9]\d*(?:\.\d+)'

Proxyer: &Proxyer {type: http, interval: 43200, exclude-filter: *ExcludeFilter, health-check: {enable: true, url: *ProxyTestUrl, interval: 600, timeout: 2000}}

Smartp: &Smartp {type: smart, url: *ProxyTestUrl, uselightgbm: true, collectdata: false, strategy: sticky-sessions, hidden: true}
Smartd: &Smartd {<<: *Smartp, use: [BaiduProxy], Url: *DirectTestUrl}

Selectp: &Selectp {type: select, url: *ProxyTestUrl, interval: 300, lazy: true, timeout: 5000, max-failed-times: 5, hidden: false}
Groupp: &Groupp {<<: *Selectp, proxies: [直连, 低倍, 高倍, 香港①, 香港②, 香港③, 台湾①, 台湾②, 台湾③, 狮城①, 狮城②, 狮城③, 日本①, 日本②, 日本③, 美国①, 美国②, 美国③]}
Groupd: &Groupd {<<: *Selectp, url: *DirectTestUrl, proxies: [直连, 江苏, 广东, 北京]}

rule-anchor:
  dom: &dom {type: http, behavior: domain, interval: 86400}
  cla: &cla {type: http, behavior: classical, interval: 86400}
  ipc: &ipc {type: http, behavior: ipcidr, interval: 86400}

proxies:
  - {name: 直连, type: direct}
  - {name: 禁止, type: reject}

proxy-providers:
  *Sub1: {<<: *Proxyer, path: ./proxy_provider/Sub1yaml, url: *SubStoreUrl, filter: *Sub1, health-check: {enable: true, url: *ProxyTestUrl, interval: 600}}
  *Sub2: {<<: *Proxyer, path: ./proxy_provider/Sub2.yaml, url: *SubStoreUrl, filter: *Sub2, health-check: {enable: true, url: *ProxyTestUrl, interval: 600}}
  *Sub3: {<<: *Proxyer, path: ./proxy_provider/Sub3.yaml, url: *SubStoreUrl, filter: *Sub3, health-check: {enable: true, url: *ProxyTestUrl, interval: 600}}
  BaiduProxy: {<<: *Proxyer, path: ./proxy_provider/BaiduProxy.yaml, url: *BaiduUrl, health-check: {enable: true, url: *DirectTestUrl, interval: 600}}

proxy-groups:
  - {name: Location, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png", <<: *Groupd}
  - {name: Domestic, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Domestic.png", <<: *Groupd}
  - {name: Emby, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png", <<: *Groupp}
  - {name: Youtube, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png", <<: *Groupp}
  - {name: Media, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ForeignMedia.png", <<: *Groupp}
  - {name: Openai, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png", <<: *Groupp}
  - {name: Telegram, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png", <<: *Groupp}
  - {name: Cloudflare, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cloudflare.png", <<: *Groupp}
  - {name: Google, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png", <<: *Groupp}
  - {name: Github, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png", <<: *Groupp}
  - {name: Microsoft, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png", <<: *Groupp}
  - {name: Apple, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png", <<: *Groupp}
  - {name: Foreign, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png", <<: *Groupp}
  - {name: Final, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png", <<: *Groupp}

  - {name: 香港①, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png", <<: *Smartp, use: [*Sub1], filter: *FilterHK}
  - {name: 台湾①, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png", <<: *Smartp, use: [*Sub1], filter: *FilterTW}
  - {name: 狮城①, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png", <<: *Smartp, use: [*Sub1], filter: *FilterSG} 
  - {name: 日本①, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png", <<: *Smartp, use: [*Sub1], filter: *FilterJP} 
  - {name: 美国①, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png", <<: *Smartp, use: [*Sub1], filter: *FilterUS}

  - {name: 香港②, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png", <<: *Smartp, use: [*Sub2], filter: *FilterHK}
  - {name: 台湾②, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png", <<: *Smartp, use: [*Sub2], filter: *FilterTW}
  - {name: 狮城②, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png", <<: *Smartp, use: [*Sub2], filter: *FilterSG} 
  - {name: 日本②, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png", <<: *Smartp, use: [*Sub2], filter: *FilterJP} 
  - {name: 美国②, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png", <<: *Smartp, use: [*Sub2], filter: *FilterUS}

  - {name: 香港③, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png", <<: *Smartp, use: [*Sub3], filter: *FilterHK}
  - {name: 台湾③, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png", <<: *Smartp, use: [*Sub3], filter: *FilterTW}
  - {name: 狮城③, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png", <<: *Smartp, use: [*Sub3], filter: *FilterSG} 
