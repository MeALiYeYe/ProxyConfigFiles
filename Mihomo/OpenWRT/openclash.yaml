SubStoreUrl: &SubStoreUrl "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
BaiduUrl: &BaiduUrl "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/main/Mihomo/BaiduProxy.yaml"

# 延迟测试链接
ProxyTestUrl: &ProxyTestUrl "https://www.gstatic.com/generate_204"
DirecTestUrl: &DirecTestUrl "https://connect.rom.miui.com/generate_204"

# 过滤规则
FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|\bHK\b|Hong|HKG)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|\bTW\b|tai|TWN)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|\bSG\b|Singapore|SGP)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|\bJP\b|Japan|JPN)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|\bUS\b|USA|States)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterEU: &FilterEU '(?i)(?:🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|\bHK\b|\bTW\b|\bSG\b|\bJP\b|\bUS\b))'
ExcludeFilter: &ExcludeFilter '(?i)(佣金|套餐|官网|官方|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|优惠|超实惠|址|AFF|Days|Date)'
FilterLowMag: &FilterLowMag '(?<!\d)0\.\d+'
FilterHighMag: &FilterHighMag '(?<![\d.])(?:[xX×倍]\s*)?(?:[2-9]\d*(?:\.\d+)?|1\.[1-9]\d*)(?:\s*[xX×倍])?'

# 代理集和代理组
Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTestUrl
    interval: 600
    timeout: 5000
#  override: 
#    dialer-proxy: Location

Smartp: &Smartp
  type: smart
  use:
    - SubStore
  interval: 300
  tolerance: 50
  url: *ProxyTestUrl
  policy-priority:
    - "(?<![\\d.])0\\.\\d+(?!\\d):2"
    - "(?<![\\d.])1\\.\\d+(?!\\d):0.5"
    - "(?<![\\d.])[2-9]\\d*(?:\\.\\d+)?(?!\\d):0.2"
    - "[xX×]4:0.1"
  uselightgbm: true
  collectdata: false
  strategy: sticky-sessions
  lazy: true
  hidden: true

Falld: &Falld
  type: fallback
  use:
    - BaiduProxy
  interval: 3600
  tolerance: 50
  url: *DirecTestUrl
  lazy: true
  hidden: true

Groupp: &Groupp
  type: select
  url: *ProxyTestUrl
  proxies:
    - 直连
    - 香港
    - 台湾
    - 狮城
    - 日本
    - 美国
    - 低倍
    - 高倍
  hidden: false

Groupd: &Groupd
  type: select
  url: *DirecTestUrl
  proxies:
    - 直连
    - 江苏
    - 广东
    - 北京
  hidden: false

# 规则集
rule-anchor:
  dom: &dom
    type: http
    behavior: domain
    interval: 86400
  cla: &cla
    type: http
    behavior: classical
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    interval: 86400

proxies:
  - name: 直连
    type: direct
    udp: true
  - name: 禁止
    type: reject

# 代理集
proxy-providers:
  SubStore:
    <<: *Proxyer
    path: ./proxies/SubStore.yaml
    url: *SubStoreUrl
  BaiduProxy:
    <<: *Proxyer
    path: ./proxies/BaiduProxy.yaml
    url: *BaiduUrl

# 代理组
proxy-groups:
  - name: Location
    <<: *Groupd
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png"
  - name: Domestic
    <<: *Groupd
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Domestic.png"
  - name: Emby
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png"
  - name: Youtube
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png"
  - name: Media
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ForeignMedia.png"
  - name: Ai
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png"
  - name: Telegram
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png"
  - name: Cloudflare
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cloudflare.png"
  - name: Google
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png"
  - name: Github
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png"
  - name: Microsoft
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png"
  - name: Apple
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png"
  - name: Foreign
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"
  - name: Final
    <<: *Groupp
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"

  - name: 江苏
    <<: *Falld
    filter: "南京|苏州"
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/lightning(1).png"
  - name: 广东
    <<: *Falld
    filter: "广州"
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/lightning(2).png"
  - name: 北京
    <<: *Falld
    filter: "北京|保定"
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/lightning(3).png"

  - name: 香港
    <<: *Smartp
    filter: *FilterHK
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png"
  - name: 台湾
    <<: *Smartp
    filter: *FilterTW
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png"
  - name: 狮城
    <<: *Smartp
    filter: *FilterSG
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png"
  - name: 日本
    <<: *Smartp
    filter: *FilterJP
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png"
  - name: 美国
    <<: *Smartp
    filter: *FilterUS
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png"
  - name: 低倍
    <<: *Smartp
    filter: *FilterLowMag
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/liuliang(2).png"
  - name: 高倍
    <<: *Smartp
    filter: *FilterHighMag
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/liuliang(3).png"

# 规则集
rule-providers:
  awavenue:
    <<: *dom
    format: mrs
    path: ./rules/awavenue.mrs
    url: "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.mrs"
  mydirect:
    <<: *cla
    format: yaml
    path: ./rules/mydirect.yaml
    url: "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/main/Mihomo/rule/Direct.yaml"
  myreject:
    <<: *cla
    format: yaml
    path: ./rules/myreject.yaml
    url: "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/main/Mihomo/rule/Reject.yaml"
  myproxy:
    <<: *cla
    format: yaml
    path: ./rules/myproxy.yaml
    url: "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/main/Mihomo/rule/Proxy.yaml"
  emby:
    <<: *cla
    format: yaml
    path: ./rules/emby.yaml
    url: "https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/main/Mihomo/rule/Emby.yaml"
  fakelocation:
    <<: *cla
    format: yaml
    path: ./rules/fakelocation.yaml
    url: "https://raw.githubusercontent.com/SunsetMkt/anti-ip-attribution/main/generated/rule-provider.yaml"

# 路由规则
rules:
  # NTP
  - AND,((NETWORK,udp),(DST-PORT,123)),DIRECT
  # STUN
  - AND,((NETWORK,udp),(DST-PORT,3478-3479,5349,19302-19309)),REJECT-DROP
  - RULE-SET,myreject,REJECT-DROP
  - RULE-SET,mydirect,Domestic
  - RULE-SET,myproxy,Foreign
  - RULE-SET,emby,Emby
  - RULE-SET,awavenue,REJECT-DROP
  - RULE-SET,fakelocation,Location
  - GEOSITE,private,DIRECT
  - GEOSITE,category-ads-all,REJECT-DROP
  - GEOSITE,youtube,Youtube
  - GEOSITE,category-entertainment,Media
  - GEOSITE,telegram,Telegram
  - GEOSITE,google,Google
  - GEOSITE,cloudflare,Cloudflare
  - GEOSITE,category-ai-chat-!cn,Ai
  - GEOSITE,github,Github
  - GEOSITE,apple,Apple
  - GEOSITE,microsoft,Microsoft
  - GEOSITE,geolocation-!cn,Foreign
  - GEOSITE,cn,Domestic
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,telegram,Telegram,no-resolve
  - GEOIP,google,Google,no-resolve
  - GEOIP,cloudflare,Cloudflare,no-resolve
  - GEOIP,cn,Domestic,no-resolve
  - MATCH,Final

#####################
########################## 全局通用配置 #########################
mixed-port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 1536
log-level: silent
unified-delay: true
tcp-concurrent: true
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 600
allow-lan: true

external-controller: 0.0.0.0:9090
external-ui: ./panel/
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
secret: ""
skip-auth-prefixes:
  - 127.0.0.1/32
  - 192.168.3.0/24

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 168
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb""

lgbm-auto-update: true
lgbm-update-interval: 72
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"

# 策略组选择和fake-ip缓存
profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

# 域名嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 5228-5230
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - "+.v2ex.com"
    - "+.google.com"
    - "+.gstatic.com"
    - "+.youtube.com"
    - "+.facebook.com"
    - "+.twitter.com"
    - "+.miui.com"
    - "+.xiaomi.com"
    - "+.vivo.com.cn"
    - "+.oppomobile.com"
    - "+.hicloud.com"
  skip-domain:
    - "+.local"
    - "+.lan"
    - "localhost"
    - "Mijia Cloud"
    - "miwifi.com"

# Tunnel配置
tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# DNS配置
dns:
  enable: true
  cache-algorithm: arc
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  respect-rules: false
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter: 
    - "GEOSITE:private,connectivity-check"
    - "+.lan"
    - "+.local"
    - "localhost"
    - "+.ntp.org"
    - "+.pool.ntp.org"
    - "time.*.com"
    - '*.dns.google'
    - 'cloudflare-dns.com'
    - '*.cloudflare-dns.com'
  nameserver-policy:
    'GEOSITE:category-ads-all': rcode://name_error
    'GEOSITE:cn,apple,microsoft':
      - 'https://dns.alidns.com/dns-query'
      - 'https://doh.pub/dns-query'
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  direct-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  proxy-server-nameserver:
    - 'https://dns.alidns.com/dns-query'
    - 'https://doh.pub/dns-query'
  nameserver:
    - 'https://dns.google/dns-query#Google'
    - 'https://cloudflare-dns.com/dns-query#Cloudflare'

