Sub1: &Sub1 "订阅一"
Sub1Url: &Sub1Url "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
Sub2: &Sub2 "订阅二"
Sub2Url: &Sub2Url "http://127.0.0.1:3000/download/VPS?target=ClashMeta&includeUnsupportedProxy=true"
Sub3: &Sub3 "订阅三"
Sub3Url: &Sub3Url "http://127.0.0.1:3000/download/CF?target=ClashMeta&includeUnsupportedProxy=true"
BaiduProxy: &BaiduProxy "https://raw.githubusercontent.com/a3332360069-ux/bdzl/main/%E7%99%BE%E5%BA%A6%E7%9B%B4%E8%BF%9E.yaml"

ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"
DirecTest: &DirecTest "https://connect.rom.miui.com/generate_204"

FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|\bHK\b|Hong\s?Kong|HKG)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|\bTW\b|Taiwan|TWN)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|\bSG\b|Singapore|SGP)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|\bJP\b|Japan|JPN)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|\bUS\b|USA|States|America)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|\bHK\b|\bTW\b|\bSG\b|\bJP\b|\bUS\b))'
FilterEU: &FilterEU '(?i)(?:英国|🇬🇧|\bUK\b|GBR|Britain|Germany|德国|🇩🇪|\bDE\b|DEU|France|法国|🇫🇷|\bFR\b|FRA|Spain|西班牙|🇪🇸|\bES\b|ESP|Italy|意大利|🇮🇹|\bIT\b|ITA|Portugal|葡萄牙|🇵🇹|\bPT\b|PRT|Switzerland|瑞士|🇨🇭|\bCH\b|CHE|Norway|挪威|🇳🇴|\bNO\b|NOR|Sweden|瑞典|🇸🇪|\bSE\b|SWE|Finland|芬兰|🇫🇮|\bFI\b|FIN|Denmark|丹麦|🇩🇰|\bDK\b|DNK|Iceland|冰岛|🇮🇸|\bIS\b|ISL|Ukraine|乌克兰|🇺🇦|\bUA\b|UKR|Poland|波兰|🇵🇱|\bPL\b|POL)'
ExcludeFilter: &ExcludeFilter '(?i)(?:佣金|套餐|官网|官方|网址|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|使用|教程|优惠|超实惠|址|AFF|Days|Date)'
FilterLow: &FilterLow '(?<!\d)0\.\d+'
FilterHigh: &FilterHigh '(?:(?:[2-9]\d*\.\d+|1\.(?:0*[1-9]\d*))|(?:[2-9]\d*|1\.(?:0*[1-9]\d*))(?=[xX×倍]))'

Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
  header:
    User-Agent:
    - "ClashMetaForAndroid/2.11.2.Meta"
    - "clash.meta"
    - "mihomo"

Falld: &Falld
  type: fallback
  use:
  - 百度直连
  url: *DirecTest
  interval: 600
  lazy: true
  hidden: true

Smartp: &Smartp
  type: smart
  use:
  - 订阅一
  - 订阅二
  - 订阅三
  policy-priority:
#  - '(?<![\d.])0\.\d+(?!\d):1.3'
#  - '(?<![\d.])1\.\d+(?!\d):0.8'
#  - '(?<![\d.])[2-9]\d*(?:\.\\d+)?(?!\d):0.5'
  uselightgbm: true
  prefer-asn: true
  collectdata: false
  max-failed-times: 3
  url: *ProxyTest
  lazy: true
  hidden: true

Groupp: &Groupp
  type: select
  proxies:
  - 直连
  - 香港
  - 台湾
  - 狮城
  - 日本
  - 美国
  - 自由
  - 民主
  url: *ProxyTest
  lazy: true
  hidden: false

Groupd: &Groupd
  type: select
  proxies:
  - 直连
  - 江苏
  - 广东
  - 北京
  url: *DirecTest
  lazy: true
  hidden: false

rule-anchor:
  cla: &cla
    type: http
    behavior: classical
    format: yaml
    interval: 86400
  dom: &dom
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400

proxies:
- name: 直连
  type: direct
  udp: true
- name: DNS_Hijack
  type: dns

proxy-providers:
  订阅一:
    <<: *Proxyer
    path: ./proxies/Sub1.yaml
    url: *Sub1Url
    override:
      additional-prefix: *Sub1
  订阅二:
    <<: *Proxyer
    path: ./proxies/Sub2.yaml
    url: *Sub2Url
    override:
      additional-prefix: *Sub2
  订阅三:
    <<: *Proxyer
    path: ./proxies/Sub3.yaml
    url: *Sub3Url
    override:
      additional-prefix: *Sub3
  百度直连:
    <<: *Proxyer
    path: ./proxies/BaiduProxy.yaml
    url: *BaiduProxy
    health-check:
      enable: true
      url: *ProxyTest
      interval: 600

