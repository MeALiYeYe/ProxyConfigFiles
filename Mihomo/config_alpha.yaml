port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 1911
tproxy-port: 1919
ipv6: true
mode: Rule
log-level: warning
unified-delay: true
tcp-concurrent: true
allow-lan: true
external-controller: 0.0.0.0:9090
external-ui: ./ui/
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"
secret: ""
skip-auth-prefixes:
- 10.0.0.1/8
- 127.0.0.1/8
- 192.168.0.1/16

geo-auto-update: false
geo-update-interval: 168
geox-url:
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 5228-5230
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  force-domain:
  - "+.v2ex.com"
  skip-domain:
  - "+.local"
  - "+.lan"
  - "localhost"
  - "Mijia Cloud"
  - "miwifi.com"

tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: rule
  fake-ip-filter:
  - RULE-SET,private,real-ip
  - RULE-SET,ntp,real-ip
  - RULE-SET,googlefcm,real-ip
  - MATCH,fake-ip
  default-nameserver:
  - 223.5.5.5
  - 223.6.6.6
  - 1.1.1.1
  - 1.0.0.1
  cndns: &cndns
  - 'https://dns.alidns.com/dns-query#DIRECT'
  - 'quic://dns.alidns.com#DIRECT'
  cgdns: &cgdns
  - 'https://dns.google/dns-query#DNSServer'
  - 'https://cloudflare-dns.com/dns-query#DNSServer'
  direct-nameserver:
  - 223.5.5.5
  - 223.6.6.6
  proxy-server-nameserver: *cndns
  nameserver-policy:
    '.eu.cc': *cgdns
    'RULE-SET:ads-all,awavenue': rcode://name_error
    'RULE-SET:cn,apple,microsoft': *cndns
    'RULE-SET:geolocation-!cn': *cgdns
  nameserver: *cgdns

