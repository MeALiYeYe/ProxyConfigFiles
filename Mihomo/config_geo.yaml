SubStore: &SubStore "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
VPS: &VPS "http://127.0.0.1:3000/download/VPS?target=ClashMeta"
CF: &CF "http://127.0.0.1:3000/download/CF?target=ClashMeta"

ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"
DirecTest: &DirecTest "https://wifi.vivo.com.cn/generate_204"

FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|TW|Taiwan)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|SG|Singapore)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|JP|Japan)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|US|States|America)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|HK|TW|SG|JP|US))'
ExcludeFilter: &ExcludeFilter '(?i)(?:佣金|套餐|官网|官方|网址|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|使用|教程|优惠|超实惠|址|AFF|Days|Date)'
FilterLow: &FilterLow '(?<!\d)(?<!\d\.)0\.\d+(?!\.\d)'
FilterHigh: &FilterHigh '(?<!\d\.)(?:(?:[2-9]\d*\.\d+|1\.(?:0*[1-9]\d*))|(?:[2-9]\d*|1\.(?:0*[1-9]\d*))(?=[xX×倍]))(?!\.\d)'

Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
  header:
    User-Agent:
    - "ClashMetaForAndroid/2.11.2.Meta"
    - "clash.meta"
    - "mihomo"

Smartp: &Smartp
  type: smart
  include-all-providers: true
  policy-priority:
#  - '(?<![\d.])0\.\d+(?!\d):1.3'
#  - '(?<![\d.])1\.\d+(?!\d):0.8'
#  - '(?<![\d.])[2-9]\d*(?:\.\\d+)?(?!\d):0.5'
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  interval: 120
  max-failed-times: 3
  url: *ProxyTest
  lazy: true
  hidden: true

Groupp: &Groupp
  type: select
  proxies:
  - 🟢 直连
  - 📦 自由
  - 🇭🇰 香港
  - 🇸🇬 狮城
  - 🇯🇵 日本
  - 🇺🇸 美国
  - 🪙 低倍
  - 💰 高倍
  url: *ProxyTest
  lazy: true
  hidden: false

rule-anchor:
  dom: &dom
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400

proxies:
- name: 🟢 直连
  type: direct
  udp: true
- name: ⛔️ 拒绝
  type: reject
- name: ⭕️ DNS_Hijack
  type: dns

proxy-providers:
  SubStore:
    <<: *Proxyer
    path: ./proxies/SubStore.yaml
    url: *SubStore
  VPS:
    <<: *Proxyer
    path: ./proxies/VPS.yaml
    url: *VPS
  CFTunnel:
    <<: *Proxyer
    path: ./proxies/CFTunnel.yaml
    url: *CF

proxy-groups:
- name: 📡 DNServer
  <<: *Groupp
- name: 📺 Bilibili
  <<: *Groupp
- name: 🇨🇳 Domestic
  <<: *Groupp
- name: 📽️ Netflix
  <<: *Groupp
- name: 📹︎ Tiktok
  <<: *Groupp
- name: 🎞️ Youtube
  <<: *Groupp
- name: 📻 Media
  <<: *Groupp
- name: 🤖 Ai
  <<: *Groupp
- name: 📘 Facebook
  <<: *Groupp
- name: ✈️ Telegram
  <<: *Groupp
- name: 📲 Twitter
  <<: *Groupp
- name: 🧰 Cloudflare
  <<: *Groupp
- name: 🔍 Google
  <<: *Groupp
- name: 📝 Github
  <<: *Groupp
- name: 🪟 Microsoft
  <<: *Groupp
- name: 🍎 Apple
  <<: *Groupp
- name: 🍴 Foreign
  <<: *Groupp
- name: ♾️ Final
  <<: *Groupp
- name: 📦 自由
  <<: *Smartp
  filter: '(?i)(?:VPS|小机)'
- name: 🇭🇰 香港
  <<: *Smartp
  filter: *FilterHK
- name: 🇸🇬 狮城
  <<: *Smartp
  filter: *FilterSG
- name: 🇯🇵 日本
  <<: *Smartp
  filter: *FilterJP
- name: 🇺🇸 美国
  <<: *Smartp
  filter: *FilterUS
- name: 🪙 低倍
  <<: *Smartp
  filter: *FilterLow
- name: 💰 高倍
  <<: *Smartp
  filter: *FilterHigh

rule-providers:
  awavenue:
    <<: *dom
    path: ./rules/awavenue.mrs
    url: "https://cdn.jsdelivr.net/gh/TG-Twilight/AWAvenue-Ads-Rule@main/Filters/AWAvenue-Ads-Rule-Clash.mrs"

rules:
- DST-PORT,53/853/8853,⭕️ DNS_Hijack
- AND,((NETWORK,udp),(DST-PORT,3478-3479/5349-5350/19302-19309)),REJECT-DROP
- DST-PORT,1337/2710/6881-6999/7777,REJECT-DROP
- DST-PORT,5228-5230,🟢 直连
- DST-PORT,123,🟢 直连

- RULE-SET,awavenue,⛔️ 拒绝

- GEOSITE,private,🟢 直连
- GEOSITE,bilibili,📺 Bilibili
- GEOSITE,netflix,📽️ Netflix
- GEOSITE,tiktok,📹︎ Tiktok
- GEOSITE,youtube,🎞️ Youtube
- GEOSITE,proxymedia,📻 Media
- GEOSITE,telegram,✈️ Telegram
- GEOSITE,twitter,📲 Twitter
- GEOSITE,google,🔍 Google
- GEOSITE,cloudflare,🧰 Cloudflare
- GEOSITE,openai,🤖 Ai
- GEOSITE,github,📝 Github
- GEOSITE,apple,🍎 Apple
- GEOSITE,microsoft,🪟 Microsoft
- GEOSITE,proxy,🍴 Foreign
- GEOSITE,cn,🇨🇳 Domestic

- GEOIP,private,🟢 直连,no-resolve
- GEOIP,bilibili,📺 Bilibili,no-resolve
- GEOIP,netflix,📽️ Netflix,no-resolve
- GEOIP,facebook,📘 Facebook,no-resolve
- GEOIP,telegram,✈️ Telegram,no-resolve
- GEOIP,twitter,📲 Twitter,no-resolve
- GEOIP,google,🔍 Google,no-resolve
- GEOIP,cloudflare,🧰 Cloudflare,no-resolve
- GEOIP,apple,🍎 Apple,no-resolve
- GEOIP,cn,🇨🇳 Domestic,no-resolve

- MATCH,♾️ Final

port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 1911
tproxy-port: 1919
ipv6: true
mode: Rule
log-level: warning
unified-delay: true
tcp-concurrent: true
allow-lan: true
external-controller: 0.0.0.0:9090
external-ui: ./ui/
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"
secret: ""
skip-auth-prefixes:
- 10.0.0.1/8
- 127.0.0.1/8
- 192.168.0.1/16

geodata-mode: true 
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 168
geox-url:
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite-lite.dat"
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@releases/geoip-lite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@releases/country-lite.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 5228-5230
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  force-domain:
  - "+.v2ex.com"
  skip-domain:
  - "+.local"
  - "+.lan"
  - "localhost"
  - "Mijia Cloud"
  - "miwifi.com"

tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::/64
  fake-ip-filter-mode: rule
  fake-ip-filter:
  - GEOSITE,private,real-ip
  - GEOSITE,cn,real-ip
  - MATCH,fake-ip
  cndns: &cndns
  - 223.5.5.5
  - 223.6.6.6
  - "2400:3200::1"
  - "2400:3200:baba::1"
  cndoh: &cndoh
  - 'quic://dns.alidns.com#🟢 直连'
  - 'https://dns.alidns.com/dns-query#🟢 直连'
  cgdoh: &cgdoh
  - 'https://dns.google/dns-query#📡 DNServer'
  - 'https://cloudflare-dns.com/dns-query#📡 DNServer'
  default-nameserver: *cndns
  direct-nameserver: *cndns
  proxy-server-nameserver: *cndoh
  nameserver-policy:
    'eu.cc': *cgdoh
    'RULE-SET:awavenue': rcode://name_error
    'GEOSITE:cn,apple,microsoft': *cndoh
  nameserver: *cgdoh

