SubStoreUrl: &SubStoreUrl "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
BaiduUrl: &BaiduUrl "https://cdn.jsdelivr.net/gh/MeALiYeYe/ProxyConfigFiles@main/Mihomo/BaiduProxy.yaml"

ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"
DirecTest: &DirecTest "https://connect.rom.miui.com/generate_204"

FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|\bHK\b|Hong\s?Kong|HKG)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|\bTW\b|Taiwan|TWN)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|\bSG\b|Singapore|SGP)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|\bJP\b|Japan|JPN)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|\bUS\b|USA|States|America)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterEU: &FilterEU '(?i)(?:🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|\bHK\b|\bTW\b|\bSG\b|\bJP\b|\bUS\b))'
ExcludeFilter: &ExcludeFilter '(?i)(?:佣金|套餐|官网|官方|网址|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|使用|教程|优惠|超实惠|址|AFF|Days|Date)'
FilterLow: &FilterLow '(?<!\d)0\.\d+'
FilterHigh: &FilterHigh '(?:(?:[2-9]\d*\.\d+|1\.(?:0*[1-9]\d*))|(?:[2-9]\d*|1\.(?:0*[1-9]\d*))(?=[xX×倍]))'

Republic: &Republic
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
  header:
    User-Agent:
    - "ClashMetaForAndroid/2.11.2.Meta"
    - "clash-verge/v2.2.3"
    - "ClashforWindows/0.19.23"
    - "clash.meta"
    - "mihomo"

Smartp: &Smartp
  type: smart
  include-all-providers: true
  policy-priority:
#  - '(?<![\d.])0\.\d+(?!\d):1.3'
#  - '(?<![\d.])1\.\d+(?!\d):0.8'
#  - '(?<![\d.])[2-9]\d*(?:\.\\d+)?(?!\d):0.5'
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  max-failed-times: 3
  url: *ProxyTest
  hidden: true

Groupp: &Groupp
  type: select
  proxies:
  - DIRECT
  - HK
  - TW
  - SG
  - JP
  - US
  - Liberty
  - Democracy
  url: *ProxyTest
  lazy: true
  hidden: false

Groupd: &Groupd
  type: select
  proxies:
  - DIRECT
  - JS
  - GD
  - BJ
  Url: *DirecTest
  lazy: true
  hidden: false

rule-anchor:
  cla: &cla
    type: http
    behavior: classical
    format: yaml
    interval: 86400
  dom: &dom
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400
#################################
#############锚点结束#############
#################################
