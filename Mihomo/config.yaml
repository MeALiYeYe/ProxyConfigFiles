Sub1Url: &Sub1Url "http://127.0.0.1:3000/download/collection/Sub?target=ClashMeta"
Sub2Url: &Sub2Url "http://127.0.0.1:3000/download/collection/Bus?target=ClashMeta"
BaiduUrl: &BaiduUrl "https://cdn.jsdelivr.net/gh/MeALiYeYe/ProxyConfigFiles@main/Mihomo/BaiduProxy.yaml"

ProxyTest: &ProxyTest "https://www.gstatic.com/generate_204"
DirecTest: &DirecTest "https://wifi.vivo.com.cn/generate_204"

FilterHK: &FilterHK '(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong)'
FilterTW: &FilterTW '(?i)(?:台|台湾|🇼🇸|🇹🇼|TW|Taiwan)'
FilterSG: &FilterSG '(?i)(?:坡|新加坡|🇸🇬|SG|Singapore)'
FilterJP: &FilterJP '(?i)(?:日|日本|🇯🇵|JP|Japan)'
FilterKR: &FilterKR '(?i)(?:韩|韩国|🇰🇷|\bKR\b|KOR|Korea)'
FilterUS: &FilterUS '(?i)(?:美|美国|🇺🇸|US|States|America)'
FilterRU: &FilterRU '(?i)(?:俄罗斯|莫斯科|🇷🇺|RU|Russia|Moscow)'
FilterOther: &FilterOther '^(?!.*(香港|台湾|新加坡|日本|美国|🇭🇰|🇼🇸|🇨🇳|🇹🇼|🇸🇬|🇯🇵|🇺🇸|HK|TW|SG|JP|US))'
ExcludeFilter: &ExcludeFilter '(?i)(?:佣金|套餐|官网|官方|网址|售后|免翻|过期|剩余|到期|流量|更新|点外|重置|免流|使用|教程|优惠|超实惠|址|AFF|Days|Date)'
FilterLow: &FilterLow '(?<!\d)(?<!\d\.)0\.\d+(?!\.\d)'
FilterHigh: &FilterHigh '(?<!\d\.)(?:(?:[2-9]\d*\.\d+|1\.(?:0*[1-9]\d*))|(?:[2-9]\d*|1\.(?:0*[1-9]\d*))(?=[xX×倍]))(?!\.\d)'

Proxyer: &Proxyer
  type: http
  interval: 86400
  exclude-filter: *ExcludeFilter
  health-check:
    enable: true
    url: *ProxyTest
    interval: 600
  header:
    User-Agent:
    - "ClashMetaForAndroid/2.11.2.Meta"
    - "clash.meta"
    - "mihomo"

Smartp: &Smartp
  type: smart
  include-all-providers: true
  policy-priority:
#  - '(?<![\d.])0\.\d+(?!\d):1.3'
#  - '(?<![\d.])1\.\d+(?!\d):0.8'
#  - '(?<![\d.])[2-9]\d*(?:\.\\d+)?(?!\d):0.5'
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  interval: 120
  url: *ProxyTest
  hidden: true

Groupp: &Groupp
  type: select
  proxies:
  - 🟢 直连
  - 自由
  - 香港
  - 狮城
  - 日本
  - 美国
  interval: 300
  url: *ProxyTest
  hidden: false

Groupd: &Groupd
  type: select
  proxies:
  - 🟢 直连
  - 江苏
  - 广东
  - 北京
  interval: 300
  url: *DirecTest
  hidden: false

rule-anchor:
  dom: &dom
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipc: &ipc
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400

proxies:
- name: 🟢 直连
  type: direct
  udp: true
- name: ⛔️ 拒绝
  type: reject
- name: ⭕️ DNS_Hijack
  type: dns

proxy-providers:
  Sub1:
    <<: *Proxyer
    path: ./proxies/Sub1.yaml
    url: *Sub1Url
  Sub2:
    <<: *Proxyer
    path: ./proxies/Sub2.yaml
    url: *Sub2Url
  Baidu:
    <<: *Proxyer
    path: ./proxies/Baidu.yaml
    url: *BaiduUrl

