rules:
- DST-PORT,53,DNS_Hijack
- DST-PORT,853,DNSServer
  # STUN
- AND,((NETWORK,udp),(DST-PORT,3478-3479/5349-5350/19302-19309)),REJECT-DROP
  # Tracker
- DST-PORT,1337/2710/6881-6999/7777,REJECT-DROP
  # NTP
- AND,((NETWORK,udp),(DST-PORT,123)),DIRECT
  # FCM
- DST-PORT,5228-5230,DIRECT
- RULE-SET,private,DIRECT
- RULE-SET,private_ip,DIRECT,no-resolve
- RULE-SET,ads-all,REJECT-DROP
- RULE-SET,httpdns-cn,REJECT-DROP
- RULE-SET,rejects,REJECT-DROP
- RULE-SET,rejects_ip,REJECT-DROP,no-resolve
- RULE-SET,directs,Domestic
- RULE-SET,directs_ip,Domestic,no-resolve
- RULE-SET,proxys,Foreign
- RULE-SET,proxys_ip,Foreign,no-resolve
- RULE-SET,fakelocation,Location
- RULE-SET,fakelocation_ip,Location,no-resolve
- RULE-SET,emby,Emby
- RULE-SET,youtube,Youtube
- RULE-SET,tiktok,Tiktok
- RULE-SET,entertainment,Media
- RULE-SET,telegram,Telegram
- RULE-SET,telegram_ip,Telegram,no-resolve
- RULE-SET,google,Google
- RULE-SET,google_ip,Google,no-resolve
- RULE-SET,cloudflare,Cloudflare
- RULE-SET,cloudflare_ip,Cloudflare,no-resolve
- RULE-SET,ai-chat-!cn,Ai
- RULE-SET,github,Github
- RULE-SET,apple,Apple
- RULE-SET,apple_ip,Apple,no-resolve
- RULE-SET,microsoft,Microsoft
- RULE-SET,geolocation-!cn,Foreign
- RULE-SET,cn,Domestic
- RULE-SET,cn_ip,Domestic,no-resolve
- MATCH,Final


mixed-port: 7890
socks-port: 7891
tproxy-port: 1536
redir-port: 1538
ipv6: true
mode: Rule
log-level: warning
unified-delay: true
tcp-concurrent: true
allow-lan: true

external-controller: 0.0.0.0:9090
external-ui: ./ui/
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"
secret: ""
skip-auth-prefixes:
- 10.0.0.1/8
- 127.0.0.1/8
- 192.168.0.1/16

geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 168
geox-url:
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 5228-5230
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  force-domain:
  - "+.v2ex.com"
  skip-domain:
  - "+.local"
  - "+.lan"
  - "localhost"
  - "Mijia Cloud"
  - "miwifi.com"

tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter:
  - "+.lan"
  - "+.local"
  - "localhost"
  - "+.ntp.org"
  - "+.pool.ntp.org"
  - "time.*.com"
  default-nameserver:
  - 223.5.5.5
  - 223.6.6.6
  - 1.1.1.1
  - 1.0.0.1
  cndns: &cndns
  - 'https://dns.alidns.com/dns-query#DIRECT'
  - 'quic://dns.alidns.com#DIRECT'
  cgdns: &cgdns
  - 'https://dns.google/dns-query#DNSServer'
  - 'https://cloudflare-dns.com/dns-query#DNSServer'
  direct-nameserver:
  - 223.5.5.5
  - 223.6.6.6
  proxy-server-nameserver: *cndns
  nameserver-policy:
    'RULE-SET:ads-all,rejects': rcode://name_error
    'RULE-SET:cn,apple,microsoft,directs': *cndns
  nameserver: *cgdns

