rules:
- OR,((DST-PORT,5228-5230),(RULE-SET,googlefcm)),🟢 直连
- OR,((DST-PORT,123),(RULE-SET,ntp)),🟢 直连
- RULE-SET,private,🟢 直连
- RULE-SET,private_ip,🟢 直连,no-resolve
- RULE-SET,ads-all,⛔️ 拒绝
- RULE-SET,awavenue,⛔️ 拒绝
- RULE-SET,httpdns-cn,⛔️ 拒绝
- RULE-SET,rejects,⛔️ 拒绝
- RULE-SET,rejects_ip,⛔️ 拒绝,no-resolve
- RULE-SET,directs,Domestic
- RULE-SET,directs_ip,Domestic,no-resolve
- RULE-SET,proxys,Foreign
- RULE-SET,proxys_ip,Foreign,no-resolve
- RULE-SET,fakelocation,Location
- RULE-SET,fakelocation_ip,Location,no-resolve
- RULE-SET,emby,Emby
- RULE-SET,youtube,Youtube
- RULE-SET,entertainment,Media
- RULE-SET,telegram,Telegram
- RULE-SET,telegram_ip,Telegram,no-resolve
- RULE-SET,google,Google
- RULE-SET,google_ip,Google,no-resolve
- RULE-SET,cloudflare,Cloudflare
- RULE-SET,cloudflare_ip,Cloudflare,no-resolve
- RULE-SET,ai-chat-!cn,Ai
- RULE-SET,github,Github
- RULE-SET,apple,Apple
- RULE-SET,apple_ip,Apple,no-resolve
- RULE-SET,microsoft,Microsoft
- RULE-SET,geolocation-!cn,Foreign
- RULE-SET,cn,Domestic
- RULE-SET,cn_ip,Domestic,no-resolve
- MATCH,Final

mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
ipv6: true
mode: Rule
log-level: warning
unified-delay: true
tcp-concurrent: true
allow-lan: true
external-controller: 0.0.0.0:9090
external-ui: ./ui/
external-ui-url: "https://cdn.jsdelivr.net/gh/MeALiYeYe/ProxyConfigFiles@main/Mihomo/static/dist.zip"
secret: ""
skip-auth-prefixes:
- 10.0.0.1/8
- 127.0.0.1/8
- 192.168.0.1/16

geo-auto-update: true
geo-update-interval: 168
geox-url:
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

lgbm-auto-update: true
lgbm-update-interval: 360
lgbm-url: "https://cdn.jsdelivr.net/gh/MeALiYeYe/ProxyConfigFiles@main/Mihomo/static/Model.bin"

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 5228-5230
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  force-domain:
  - "+.v2ex.com"
  skip-domain:
  - "+.local"
  - "+.lan"
  - "localhost"
  - "Mijia Cloud"
  - "miwifi.com"

tun:
  enable: false
  device: Mihomo
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: :1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::/64
  fake-ip-filter:
  - "RULE-SET:private"
  - "RULE-SET:googlefcm"
  - "RULE-SET:ntp"
  - "RULE-SET:cn"
  cndoh: &cndoh
  - 'quic://dns.alidns.com#🟢 直连'
  - 'https://dns.alidns.com/dns-query#🟢 直连'
  cgdoh: &cgdoh
  - 'https://dns.google/dns-query#Google'
  - 'https://cloudflare-dns.com/dns-query#Cloudflare'
  nameserver-policy:
    'RULE-SET:ads-all,awavenue,rejects': rcode://name_error
    'RULE-SET:cn,apple,microsoft,directs': *cndoh
  nameserver: *cgdoh