[General]
CORE_TYPE = Meta

# =====================
# 端口 / 控制
# =====================
MIXED_PORT = 7890
PROXY_PORT = 7892
TPROXY_PORT = 1536
CN_PORT = 9090
DA_PASSWORD = 

# =====================
# 基础行为
# =====================
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule
ENABLE_UNIFIED_DELAY = 1
ENABLE_TCP_CONCURRENT = 1

# =====================
# IPv6
# =====================
IPV6_ENABLE = 1
IPV6_DNS = 1

# =====================
# DNS 核心
# =====================
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 1
APPEND_DEFAULT_DNS = 1
APPEND_WAN_DNS = 0

STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 1
CUSTOM_FAKEIP_FILTER_MODE = blacklist
FAKEIP_RANGE = 198.18.0.0/16

# ⚠️ 注意：你原配置是 false，这里保持一致
ENABLE_RESPECT_RULES = 0

CUSTOM_NAME_POLICY = 1
CUSTOM_HOST = 1
CUSTOM_FALLBACK_FILTER = 1

# =====================
# 代理模式
# =====================
EN_MODE = fake-ip-mix
DISABLE_UDP_QUIC = 0   # 你原配置允许 QUIC
STACK_TYPE = mixed

# =====================
# Sniffer（域名嗅探）
# =====================
ENABLE_META_SNIFFER = 1
ENABLE_META_SNIFFER_CUSTOM = 1
ENABLE_META_SNIFFER_PURE_IP = 1

# =====================
# Geo 数据
# =====================
ENABLE_GEOIP_DAT = 1
GEODATA_LOADER = standard

GEO_AUTO_UPDATE = 1
GEO_UPDATE_WEEK_TIME = *
GEO_UPDATE_DAY_TIME = 0

GEOIP_AUTO_UPDATE = 1
GEOIP_UPDATE_WEEK_TIME = *
GEOIP_UPDATE_DAY_TIME = 0

GEOSITE_AUTO_UPDATE = 1
GEOSITE_UPDATE_WEEK_TIME = *
GEOSITE_UPDATE_DAY_TIME = 0

GEOASN_AUTO_UPDATE = 1
GEOASN_UPDATE_WEEK_TIME = *
GEOASN_UPDATE_DAY_TIME = 0

# =====================
# China IP 分流
# =====================
CHINA_IP_ROUTE = 1
CHINA_IP6_ROUTE = 0
CHNR_AUTO_UPDATE = 1
CHNR_UPDATE_WEEK_TIME = *
CHNR_UPDATE_DAY_TIME = 6

# =====================
# LGBM（智能选路）
# =====================
AUTO_SMART_SWITCH = 0
SMART_ENABLE_LGBM = 1
SMART_PREFER_ASN = 1

LGBM_AUTO_UPDATE = 1
LGBM_UPDATE_INTERVAL = 72
LGBM_CUSTOM_URL = https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin

# =====================
# 其它优化
# =====================
FIND_PROCESS_MODE = off
SKIP_PROXY_ADDRESS = 1
DISABLE_QUIC_GO_GSO = 1

# =====================
# 重启策略
# =====================
RESTART = false
