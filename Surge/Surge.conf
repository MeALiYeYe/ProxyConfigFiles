[General]
loglevel = warning
show-error-page-for-reject = true
skip-proxy = %APPEND%, 0.0.0.0/8, 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.168.0.0/16, 198.18.0.0/15, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32, ::1/128, ::/128, ::ffff:0:0/96, 64:ff9b::/96, 100::/64, 2001::/32, 2001:10::/28, 2001:20::/28, 2001:db8::/32, 2002::/16, fc00::/7, fe80::/10, fec0::/10, ff00::/8
test-timeout = 3
proxy-test-url = http://www.gstatic.com/generate_204
internet-test-url = http://wifi.vivo.com.cn/generate_204
geoip-maxmind-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb
exclude-simple-hostnames = true
allow-wifi-access = false
allow-hotspot-access = false
udp-policy-not-supported-behaviour = REJECT
wifi-access-http-port = 6152
# http-listen = 0.0.0.0:6152
# socks5-listen = 0.0.0.0:6153
wifi-access-socks5-port = 6153
all-hybrid = true
ipv6 = false
ipv6-vif = auto
encrypted-dns-follow-outbound-mode = true
dns-server = 223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1
encrypted-dns-server = quic://dns.alidns.com, h3://dns.alidns.com/dns-query
hijack-dns = *:53, *:853, *:8853
read-etc-hosts = true
use-local-host-item-for-proxy = true
http-api-tls = true
http-api-web-dashboard = true
block-quic = all
proxy-test-udp = apple.com@1.0.0.1
compatibility-mode = 1

[Proxy Group]
Sub_Store = select, policy-path=https://sub.store/download/collection/Sub?target=Surge, update-interval=43200, hidden=1, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/sub.png, no-alert=0, include-all-proxies=0
Groups = select, DIRECT, 香港, 台湾, 狮城, 日本, 美国, 低倍, 高倍, no-alert=0, hidden=1, include-all-proxies=0
香港 = smart, policy-regex-filter=🇭🇰|(?i)HK|香港, hidden=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png, no-alert=0, include-other-group=Sub_Store, persistent=0, include-all-proxies=0
台湾 = smart, policy-regex-filter=🇹🇼|🇼🇸|🇨🇳|(?i)TW|台湾, hidden=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png, no-alert=0, include-other-group=Sub_Store, include-all-proxies=0
狮城 = smart, policy-regex-filter=🇸🇬|(?i)SG|狮城, hidden=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png, no-alert=0, include-other-group=Sub_Store, include-all-proxies=0
日本 = smart, policy-regex-filter=🇯🇵|(?i)JP|日本, hidden=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png, no-alert=0, include-other-group=Sub_Store, include-all-proxies=0
美国 = smart, policy-regex-filter=🇺🇸|(?i)US|美国, hidden=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png, no-alert=0, include-other-group=Sub_Store, include-all-proxies=0
低倍 = smart, policy-regex-filter=0\.\d+, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=Sub_Store, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cellular.png
高倍 = smart, policy-regex-filter=(?!0\.)[1-9]\d*(?:\.\d+), no-alert=0, hidden=1, include-all-proxies=0, include-other-group=Sub_Store, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/WiFi.png
Emby = select, include-other-group=Groups, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/emby.png
Tiktok = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/tiktok(1).png, no-alert=0, hidden=0, include-all-proxies=0
Youtube = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/youtube.png, no-alert=0, hidden=0, include-all-proxies=0
Media = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ForeignMedia.png, no-alert=0, hidden=0, include-all-proxies=0
OpenAi = select, include-other-group=Groups, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/ChatGPT-green.png
Telegram = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/telegram(blue1).png, no-alert=0, hidden=0, include-all-proxies=0
Google = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/google(1).png, no-alert=0, hidden=0, include-all-proxies=0
Cloudflare = select, include-other-group=Groups, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cloudflare.png
Github = select, include-other-group=Groups, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png
Microsoft = select, include-other-group=Groups, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/microsoft.png
Apple = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/apple.png, no-alert=0, hidden=0, include-all-proxies=0
Foreign = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png, hidden=0, no-alert=0, include-all-proxies=0
Domestic = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Domestic.png, hidden=0, no-alert=0, include-all-proxies=0
Final = select, include-other-group=Groups, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png, hidden=0, no-alert=0, include-all-proxies=0

