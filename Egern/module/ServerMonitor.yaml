name: 服务器监控
description: 服务器监控小组件
icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/color/Server.png

env_schema:
  SSH_SERVER_1_NAME:
    name: 🏷️ [节点1] 显示名称
    default_value: "Oracle"
  SSH_SERVER_1_HOST:
    name: 🌐 [节点1] IP/域名
    default_value: ""
  SSH_SERVER_1_PORT:
    name: 🔌 [节点1] 端口
    default_value: "22"
  SSH_SERVER_1_USER:
    name: 👤 [节点1] 用户名
    default_value: "root"
  SSH_SERVER_1_PWD:
    name: 🔐 [节点1] 密码
    default_value: ""
  SSH_SERVER_1_KEY:
    name: 🔑 [节点1] 私钥
    default_value: ""

  SSH_SERVER_2_NAME:
    name: 🏷️ [节点2] 显示名称 (留空停用)
