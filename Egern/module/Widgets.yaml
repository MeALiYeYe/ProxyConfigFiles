name: Egern 桌面小组件
description: 今日天气、网络信息
env_schema:
  GAS_REGION:
    name: 📍 油价查询地区
    description: "直辖市输入拼音，其他省份输入省份/省会拼音"
    default_value: sichuan/chengdu
  KEY:
    name: 🌅 APIKey
    description: "和风天气 API Key"
    default_value:
  API_HOST:
    name: 🎐 APIHost
    description: "和风天气 API Host"
    default_value:
  LOCATION:
    name: ⛳ Location
    description: "和风天气中文城市名"
    default_value: 成都
  Cookie:
    name: 📝 Cookie
    description: "电信手机营业厅获取Cookie"
    default_value:
  手机号:
    name: 📞 电信手机号
    default_value:
  broadnet_access:
    name: 🥇 广电access
    description: "请求头中的access值"
    default_value:
  broadnet_body:
    name: 🥈 广电body
    description: "请求的Body中data对应的长串加密字符串"
    default_value:
dns: {}

scriptings:
- generic: 
    name: 全国油价
    script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/GasPrice.js
- generic: 
    name: 电信余量
    script_url: https://raw.githubusercontent.com/IBL3ND/module/refs/heads/main/CT_Widget.JS
- generic: 
    name: 广电余量
    script_url: https://raw.githubusercontent.com/IBL3ND/module/refs/heads/main/CBN_Widget.JS
- generic:
    name: 网络信息
    script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/NetworkInfo.js
- generic:
    name: 和风天气
    script_url: https://raw.githubusercontent.com/IBL3ND/module/refs/heads/main/Weather_Widget.JS

widgets:
- name: 全国油价
  script_name: 全国油价
- name: 网络信息
  script_name: 网络信息
- name: 和风天气
  script_name: 和风天气
- name: 电信余量
  script_name: 电信余量
- name: 广电余量
  script_name: 广电余量
