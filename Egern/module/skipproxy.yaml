name: Bypass Tunnel Proxy (CN Apps Enhanced)
description: 直连国内银行、支付、运营商、政务与视频类应用，避免TUN/VIF检测（增强版）

bypass_tunnel_proxy:
  # ===== 四大运营商（含广电）=====
  - '*.10099.com.cn'
  - '*.10086.cn'
  - '*.chinamobile.com'
  - '*.cmcc.com'
  - '*.cmcc.net'

  - '*.10010.com'
  - '*.10010.cn'
  - '*.chinaunicom.com'
  - '*.chinaunicom.cn'

  - '*.189.cn'
  - '*.chinatelecom.com.cn'
  - '*.chinatelecom.com'

  - '*.192.168.0.1'   # 有些光猫/运营商网关
  - '*.bnmcc.com.cn'  # 中国广电
  - '*.cbn.cn'

  # ===== 支付体系 =====
  - '*.alipay.com'
  - '*.alipayobjects.com'
  - '*.alipaydns.com'
  - '*.alipay.net'
  - '*.antgroup.com'
  - '*.aliyunpay.com'

  - '*.tenpay.com'
  - '*.wechat.com'
  - '*.weixin.qq.com'
  - 'pay.weixin.qq.com'
  - 'wx.tenpay.com'
  - 'mapi.weixin.qq.com'
  - 'api.mch.weixin.qq.com'

  - '*.unionpay.com'
  - '*.unionpaysecure.com'
  - '*.unionpayintl.com'

  # ===== 国有银行 =====
  - '*.icbc.com.cn'
  - '*.95588.com'
  - '*.ccb.com'
  - '*.ccb.com.cn'
  - '*.boc.cn'
  - '*.bankofchina.com'
  - '*.abchina.com'
  - '*.abchina.com.cn'
  - '*.psbc.com'
  - '*.psbc.com.cn'

  # ===== 全国性股份制银行 =====
  - '*.cmbchina.com'
  - '*.cmbchina.cn'
  - '*.bankcomm.com'

  - '*.cib.com.cn'         # 兴业
  - '*.cebbank.com'
  - '*.cebbank.com.cn'     # 光大
  - '*.cmbc.com.cn'
  - '*.cmbc.com'           # 民生
  - '*.citicbank.com'
  - '*.ecitic.com'         # 中信
  - '*.cgbchina.com.cn'
  - '*.cgbchina.com'       # 广发
  - '*.hxb.com.cn'
  - '*.hxb.com'            # 华夏
  - '*.spdb.com.cn'
  - '*.spdb.com'           # 浦发
  - '*.cbhb.com.cn'        # 渤海
  - '*.hfbank.com.cn'      # 恒丰
  - '*.czbank.com'
  - '*.czbank.com.cn'      # 浙商

  # ===== 政务 & 其他 =====
  - '*.gov.cn'
  - '*.chinatax.gov.cn'
  - '*.etax.cn'
  - '*.医保.cn'
  - '*.yibao.cn'
  - '*.12306.cn'

