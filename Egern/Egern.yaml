    - ::1
    ip6-loopback:
    - ::1
    ip6-localnet:
    - fe00::0
    ip6-mcastprefix:
    - ff00::0
    ip6-allnodes:
    - ff02::1
    ip6-allrouters:
    - ff02::2
    ip6-allhosts:
    - ff02::3
    dns.google:
    - 8.8.4.4
    - 8.8.8.8
    - 2001:4860:4860::8844
    - 2001:4860:4860::8888
    dns64.dns.google:
    - 2001:4860:4860::64
    - 2001:4860:4860::6464
    dns.cloudflare.com:
