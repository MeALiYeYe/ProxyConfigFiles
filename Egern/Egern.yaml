      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple_Domain.list
      value: DomesticDNS
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/China/China_Domain.list
      value: DomesticDNS
      disabled: false
  - domain_wildcard:
      match: '*'
      value: ForeignDNS
      disabled: false
