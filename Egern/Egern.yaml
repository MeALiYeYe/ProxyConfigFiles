auto_update:
  url: https://raw.githubusercontent.com/MeALiYeYe/ProxyConfigFiles/refs/heads/main/Egern/Egern.yaml
  interval: 86400
ipv6: true
http_port: 3080
socks_port: 3090
allow_external_connections: false
vif_only: true
block_quic: true
hide_vpn_icon: false
hijack_dns:
- '*:53'
- '*:853'
- '*:8853'
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-asn.mmdb
proxy_latency_test_url: https://www.gstatic.com/generate_204
direct_latency_test_url: https://wifi.vivo.com.cn/generate_204
compat_route: true
include_all_networks: false
include_apns: false
include_cellular_services: false
include_local_networks: false
dns:
  bootstrap:
  - 223.5.5.5
  - 223.6.6.6
  - 2400:3200::1
  - 2400:3200:baba::1
  upstreams:
    DomesticDNS:
    - https://doh.pub/dns-query
    - quic://dns.alidns.com
    - h3://dns.alidns.com/dns-query
    ForeignDNS:
    - h3://dns.google/dns-query
    - h3://dns.cloudflare.com/dns-query
    - h3://cloudflare-dns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Apple/Apple_Domain.list
      value: DomesticDNS
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Proxy/Proxy_Domain.list
      value: ForeignDNS
  - domain_wildcard:
      match: '*'
      value: DomesticDNS
      disabled: false
  hosts:
    ip6-localhost:
    - ::1
    ip6-loopback:
    - ::1
    ip6-localnet:
    - fe00::0
    ip6-mcastprefix:
    - ff00::0
    ip6-allnodes:
    - ff02::1
    ip6-allrouters:
    - ff02::2
    ip6-allhosts:
    - ff02::3
    dns.google:
    - 8.8.4.4
    - 8.8.8.8
    - 2001:4860:4860::8844
    - 2001:4860:4860::8888
    dns64.dns.google:
    - 2001:4860:4860::64
    - 2001:4860:4860::6464
    dns.cloudflare.com:
    - 104.16.248.249
    - 104.16.249.249
    - 2606:4700::6810:f9f9
    - 2606:4700::6810:f8f9
    cloudflare-dns.com:
    - 104.16.248.249
    - 104.16.249.249
    - 2606:4700::6810:f9f9
    - 2606:4700::6810:f8f9
    1dot1dot1dot1.cloudflare-dns.com:
    - 1.1.1.1
    - 1.0.0.1
    - 2606:4700:4700::1001
    - 2606:4700:4700::1111
    one.one.one.one:
    - 1.1.1.1
    - 1.0.0.1
    - 2606:4700:4700::1001
    - 2606:4700:4700::1111
    dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
    - 2400:3200:baba::1
    - 2400:3200::1
    doh.pub:
    - 120.53.53.53
    - 1.12.12.12
    - '2402:4e00:1::'
    - '2402:4e00::'
    dot.pub:
    - 120.53.53.53
    - 1.12.12.12
    - '2402:4e00:1::'
    - '2402:4e00::'
    raw.githubusercontent.com:
    - 185.199.108.133
    - 185.199.109.133
    - 185.199.110.133
    - 185.199.111.133
    - 2606:50c0:8000::154
    - 2606:50c0:8001::154
    - 2606:50c0:8002::154
    - 2606:50c0:8003::154
    iosapps.itunes.apple.com:
    - iosapps.itunes.apple.com.download.ks-cdn.com
