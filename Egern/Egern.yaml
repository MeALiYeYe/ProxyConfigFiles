    - 104.16.249.249
    - 2606:4700::6810:f9f9
    - 2606:4700::6810:f8f9
    cloudflare-dns.com:
    - 104.16.248.249
    - 104.16.249.249
    - 2606:4700::6810:f9f9
    - 2606:4700::6810:f8f9
    1dot1dot1dot1.cloudflare-dns.com:
    - 1.1.1.1
    - 1.0.0.1
    - 2606:4700:4700::1001
    - 2606:4700:4700::1111
    one.one.one.one:
    - 1.1.1.1
    - 1.0.0.1
    - 2606:4700:4700::1001
    - 2606:4700:4700::1111
    dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
    - 2400:3200:baba::1
    - 2400:3200::1
    doh.pub:
    - 120.53.53.53
    - 1.12.12.12
    - '2402:4e00:1::'
    - '2402:4e00::'
    dot.pub:
    - 120.53.53.53
