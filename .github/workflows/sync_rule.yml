name: Sync_rule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'rules/**'

concurrency:
  group: rules-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean tmp
        run: |
          rm -rf tmp/expanded tmp/normalized
          mkdir -p tmp/expanded tmp/normalized

      ################################
      # 1️⃣ Expand includes（优化版）
      ################################
      - name: Expand includes
        run: |
          set -e

          declare -A visited_file
          declare -A visited_url

          cache_dir="/tmp/rule_cache"
          mkdir -p "$cache_dir"
          mkdir -p tmp/expanded

          # URL 缓存
          fetch_url() {
            local url="$1"
            local key
            key=$(echo -n "$url" | md5sum | cut -d' ' -f1)
            local cache_file="$cache_dir/$key"

            # 已下载直接用
            if [ -f "$cache_file" ]; then
              cat "$cache_file"
              return
            fi

            # 避免并发重复下载
            if [[ -n "${visited_url[$url]}" ]]; then
              return
            fi
            visited_url[$url]=1

            echo "[fetch] $url"

            curl -sSL --retry 3 --connect-timeout 10 "$url" \
              | tee "$cache_file"
          }

          # 递归展开（输出到 stdout，不写文件）
          expand_file() {
            local file="$1"

            # 防止重复展开
            if [[ -n "${visited_file[$file]}" ]]; then
              return
            fi
            visited_file[$file]=1

            while IFS= read -r line || [ -n "$line" ]; do
      
              # @ URL
              if [[ "$line" =~ ^@https?:// ]]; then
                url="${line#@}"
                echo "# source: $url"
                fetch_url "$url"

              # @ 本地
              elif [[ "$line" =~ ^@ ]]; then
                path="$(dirname "$file")/${line#@}"
                if [ -f "$path" ]; then
                  echo "# include: $path"
                  expand_file "$path"
                else
                  echo "Warning: $path not found" >&2
                fi

              # #!include / #!source
              elif [[ "$line" =~ ^#!(include|source):[[:space:]]* ]]; then
                ref="$(echo "$line" | sed -E 's/^#!(include|source):[[:space:]]*//')"

                echo "$line"

                if [[ "$ref" =~ ^https?:// ]]; then
                  fetch_url "$ref"
                else
                  path="$(dirname "$file")/$ref"
                  if [ -f "$path" ]; then
                    expand_file "$path"
                  else
                    echo "Warning: $path not found" >&2
                  fi
                fi

              # 兼容旧语法
              elif [[ "$line" =~ ^#[[:space:]]*(include|source): ]]; then
                ref="$(echo "$line" | sed -E 's/^#[[:space:]]*(include|source):[[:space:]]*//')"

                echo "$line"

                if [[ "$ref" =~ ^https?:// ]]; then
                  fetch_url "$ref"
                else
                  path="$(dirname "$file")/$ref"
                  if [ -f "$path" ]; then
                    expand_file "$path"
                  else
                    echo "Warning: $path not found" >&2
                  fi
                fi

              else
                echo "$line"
              fi

           done < "$file"
          }

          # 遍历 rules → 输出到 tmp/expanded
          while IFS= read -r file; do
            out="tmp/expanded/${file#rules/}"
            mkdir -p "$(dirname "$out")"

            echo "[expand] $file → $out"

            expand_file "$file" > "$out"
          done < <(find rules -type f)

      ################################
      # 2️⃣ Normalize rules
      ################################
      - name: Normalize rules
        run: |
          set -e

          ################################ 
          # YAML → Mihomo classical 
          ################################
          convert_yaml() {
            input="$1"
            output="$2"

            sed '1d' "$input" | sed 's/^- //' | while read -r line; do
              if echo "$line" | grep -qE '^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-WILDCARD|DOMAIN-REGEX|IP-CIDR|IP-CIDR6|GEOIP|PROTOCOL),'; then
                echo "$line"
              elif echo "$line" | grep -q '^\+\.'; then
                echo "DOMAIN-SUFFIX,${line#+.}"
              elif echo "$line" | grep -q '/'; then
                echo "IP-CIDR,$line"
              else
                echo "DOMAIN,$line"
              fi
            done > "$output"
          }

          ################################ 
          # 单文件 normalize 
          ################################
          normalize_file() {
            input="$1"
            output="$2"

            tmp_input=$(mktemp)
            sed '/^# source:/d' "$input" > "$tmp_input"

            if grep -q '^payload:' "$tmp_input"; then
              echo "[YAML] $input"
              convert_yaml "$tmp_input" "$output"
            else
              echo "[TEXT] $input"
              sed '/^#/d;/^$/d' "$tmp_input" > "$output"
            fi

            rm -f "$tmp_input"
          }

          ################################ 
          # 处理规则文件，保留 rules 子目录结构
          ################################
          find tmp/expanded -type f \
            ! -path "*/\.*" \
            ! -name "*.md" \
            ! -name "*.png" \
            ! -name "*.jpg" \
            ! -name "*.jpeg" \
            ! -name "*.webp" \
            | while read -r file; do
            rel_path="${file#tmp/expanded/}"
            rel_path="${rel_path#./}"
            dir_path=$(dirname "$rel_path")
            filename=$(basename "$file")

            if [[ "$filename" == *"@"* ]]; then
              base="${filename%%@*}"
            else
              base="${filename%.*}"
            fi

            out="tmp/normalized/${dir_path}/${base}.list"
            mkdir -p "$(dirname "$out")"

            tmp=$(mktemp)
            normalize_file "$file" "$tmp"

            if [ -f "$out" ]; then
              cat "$out" "$tmp" | sed '/^#/d;/^$/d' | sort -u > "${out}.new"
              mv "${out}.new" "$out"
            else
              mv "$tmp" "$out"
            fi

            ################################
            # IPv4/IPv6 collapse
            ################################
            ipv4_tmp=$(mktemp)
            ipv6_tmp=$(mktemp)
            grep '^IP-CIDR,' "$out" | cut -d',' -f2 > "$ipv4_tmp" || true
            grep '^IP-CIDR6,' "$out" | cut -d',' -f2 > "$ipv6_tmp" || true

            py_script=$(mktemp)
            printf '%s\n' \
            'import sys, ipaddress' \
            '' \
            'mode = sys.argv[1]' \
            'file = sys.argv[2]' \
            '' \
            'with open(file) as f:' \
            '    nets = [ipaddress.ip_network(line.strip(), strict=False) for line in f if line.strip()]' \
            '' \
            'collapsed = sorted(ipaddress.collapse_addresses(nets))' \
            '' \
            'if mode == "ipv4":' \
            '    for net in collapsed:' \
            '        if net.version == 4:' \
            '            print(f"IP-CIDR,{net}")' \
            'elif mode == "ipv6":' \
            '    for net in collapsed:' \
            '        if net.version == 6:' \
            '            print(f"IP-CIDR6,{net}")' \
            > "$py_script"

            if [ -s "$ipv4_tmp" ]; then
              python3 "$py_script" ipv4 "$ipv4_tmp" > "${out}_ipv4.tmp"
              grep -v '^IP-CIDR,' "$out" | cat - "${out}_ipv4.tmp" | sort -u > "${out}.new"
              mv "${out}.new" "$out"
              rm -f "${out}_ipv4.tmp"
            fi

            if [ -s "$ipv6_tmp" ]; then
              python3 "$py_script" ipv6 "$ipv6_tmp" > "${out}_ipv6.tmp"
              grep -v '^IP-CIDR6,' "$out" | cat - "${out}_ipv6.tmp" | sort -u > "${out}.new"
              mv "${out}.new" "$out"
              rm -f "${out}_ipv6.tmp"
            fi

            rm -f "$ipv4_tmp" "$ipv6_tmp" "$py_script"
          done

      ################################
      # 3️⃣ Generate Rules
      ################################
      - name: Generate rules
        run: |
          set -e

          mkdir -p Mihomo/rule
          mkdir -p Egern/rule
          mkdir -p "Quantumult X/rule"

          # ✅ 防止历史残留
          rm -rf Mihomo/rule/* Egern/rule/* "Quantumult X/rule"/* "Surge/rule"/*

          total_rules=0

          while read -r file; do

            rel_path="${file#tmp/normalized/}"   # 相对 tmp/normalized 目录
            rel_path="${rel_path#./}"   # 防御 ./ 前缀
            out_dir=$(dirname "$rel_path")       # 子目录
            base=$(basename "$rel_path" .list)
            
            name="$out_dir/$base"                # 保持子目录结构
            [[ "$out_dir" == "." ]] && name="$base"

            tmp=$(mktemp)

            echo "Processing $name"

            sed '/^#/d;/^$/d' "$file" | sort -u > "$tmp"

            sorted=$(mktemp)

            grep '^DOMAIN,' "$tmp" | sort -u >> "$sorted" || true
            grep '^DOMAIN-SUFFIX,' "$tmp" | sort -u >> "$sorted" || true
            grep '^DOMAIN-KEYWORD,' "$tmp" | sort -u >> "$sorted" || true
            grep '^DOMAIN-WILDCARD,' "$tmp" | sort -u >> "$sorted" || true

            ipv4_tmp=$(mktemp)
            ipv6_tmp=$(mktemp)

            grep '^IP-CIDR,' "$tmp" | cut -d',' -f2 > "$ipv4_tmp" || true
            grep '^IP-CIDR6,' "$tmp" | cut -d',' -f2 > "$ipv6_tmp" || true

            py_script=$(mktemp)

            printf '%s\n' \
            'import sys, ipaddress' \
            '' \
            'mode = sys.argv[1]' \
            'file = sys.argv[2]' \
            '' \
            'with open(file) as f:' \
            '    nets = [ipaddress.ip_network(line.strip(), strict=False) for line in f if line.strip()]' \
            '' \
            'collapsed = sorted(ipaddress.collapse_addresses(nets))' \
            '' \
            'if mode == "ipv4":' \
            '    for net in collapsed:' \
            '        if net.version == 4:' \
            '            print(f"IP-CIDR,{net}")' \
            'elif mode == "ipv6":' \
            '    for net in collapsed:' \
            '        if net.version == 6:' \
            '            print(f"IP-CIDR6,{net}")' \
            > "$py_script"

            if [ -s "$ipv4_tmp" ]; then
              python3 "$py_script" ipv4 "$ipv4_tmp" >> "$sorted"
            fi

            if [ -s "$ipv6_tmp" ]; then
              python3 "$py_script" ipv6 "$ipv6_tmp" >> "$sorted"
            fi

            rm -f "$ipv4_tmp" "$ipv6_tmp" "$py_script"

            grep -Ev '^(DOMAIN|IP-CIDR)' "$tmp" >> "$sorted" || true

            mv "$sorted" "$tmp"

            count=$(wc -l < "$tmp")
            total_rules=$((total_rules + count))

            domain_count=$(grep -Ec '^(DOMAIN|DOMAIN-SUFFIX),' "$tmp" || true)
            ip_count=$(grep -Ec '^(IP-CIDR|IP-CIDR6),' "$tmp" || true)

            echo "$name total: $count (domain: $domain_count / ip: $ip_count)"

            ################################
            # Mihomo
            ################################

            mihomo_domain_out="Mihomo/rule/$name.yaml"
            mihomo_ip_out="Mihomo/rule/${name}_ip.yaml"

            mkdir -p "$(dirname "$mihomo_domain_out")"
            mkdir -p "$(dirname "$mihomo_ip_out")"

            echo "payload:" > "$mihomo_domain_out"
            echo "payload:" > "$mihomo_ip_out"

            grep -E '^(DOMAIN|DOMAIN-SUFFIX),' "$tmp" | while IFS=',' read -r type value extra; do
              case "$type" in
                DOMAIN-SUFFIX)
                  echo "  - +.$value" >> "$mihomo_domain_out"
                  ;;
                DOMAIN)
                  echo "  - $value" >> "$mihomo_domain_out"
                  ;;
              esac
            done

            grep -E '^(IP-CIDR|IP-CIDR6),' "$tmp" \
            | cut -d',' -f2 \
            | sed 's/^/  - /' >> "$mihomo_ip_out"

            if [ $(wc -l < "$mihomo_domain_out") -le 1 ]; then rm -f "$mihomo_domain_out"; fi
            if [ $(wc -l < "$mihomo_ip_out") -le 1 ]; then rm -f "$mihomo_ip_out"; fi

            ################################
            # Quantumult X
            ################################

            qx_out="Quantumult X/rule/$name.list"
            mkdir -p "$(dirname "$qx_out")"
            cp "$tmp" "$qx_out"

            ################################
            # Surge
            ################################

            surge_out="Surge/rule/$name.list"
            mkdir -p "$(dirname "$surge_out")"
            cp "$tmp" "$surge_out"

            ################################
            # Egern
            ################################

            egern_out="Egern/rule/$name.yaml"
            mkdir -p "$(dirname "$egern_out")"
            rm -f "$egern_out"

            if grep -qE '^IP-CIDR,|^IP-CIDR6,|^GEOIP,' "$tmp"; then
              echo "no_resolve: true" >> "$egern_out"
            fi

            if grep -q '^DOMAIN-SUFFIX,' "$tmp"; then
              echo "domain_suffix_set:" >> "$egern_out"
              grep '^DOMAIN-SUFFIX,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN,' "$tmp"; then
              echo "domain_set:" >> "$egern_out"
              grep '^DOMAIN,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN-KEYWORD,' "$tmp"; then
              echo "domain_keyword_set:" >> "$egern_out"
              grep '^DOMAIN-KEYWORD,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN-WILDCARD,' "$tmp"; then
              echo "domain_wildcard_set:" >> "$egern_out"
              grep '^DOMAIN-WILDCARD,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN-REGEX,' "$tmp"; then
              echo "domain_regex_set:" >> "$egern_out"
              grep '^DOMAIN-REGEX,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^IP-CIDR,' "$tmp"; then
              echo "ip_cidr_set:" >> "$egern_out"
              grep '^IP-CIDR,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^IP-CIDR6,' "$tmp"; then
              echo "ip_cidr6_set:" >> "$egern_out"
              grep '^IP-CIDR6,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^GEOIP,' "$tmp"; then
              echo "geoip_set:" >> "$egern_out"
              grep '^GEOIP,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^PROTOCOL,' "$tmp"; then
              echo "protocol_set:" >> "$egern_out"
              grep '^PROTOCOL,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

          done < <(find tmp/normalized -type f -name '*.list')

      ################################
      # 3️⃣ Download Mihomo
      ################################
      - name: Download Mihomo
        run: |
          set -e

          VERSION="v1.19.24"
          FILE="mihomo-linux-amd64-${VERSION}.gz"
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/${FILE}"

          # 如果已存在且可执行，则跳过
          if [ -x "./mihomo" ]; then
            echo "Mihomo already exists, skip download"
            ./mihomo -v || true
            exit 0
          fi

          echo "Downloading Mihomo..."

          # 清理异常残留（关键）
          rm -f mihomo mihomo.gz

          curl -L --fail --retry 3 --connect-timeout 10 -o mihomo.gz "$URL"

          # 校验 gzip（防止下载到 HTML）
          if ! file mihomo.gz | grep -q gzip; then
            echo "Download failed (not gzip)"
            cat mihomo.gz
            exit 1
          fi

          gunzip -f mihomo.gz
          chmod +x mihomo

          echo "Mihomo ready:"
          ./mihomo -v || true

      ################################
      # 4️⃣ YAML → MRS
      ################################
      - name: Convert to MRS
        run: |
          detect_behavior() {
            file="$1"
            first=$(grep -v '^payload:' "$file" | sed 's/^- //' | head -n 1)

            if echo "$first" | grep -q '/'; then
              echo "ipcidr"
            else
              echo "domain"
            fi
          }

          find Mihomo/rule -type f -name '*.yaml' | sort | while read -r file; do

            rel_path="${file#Mihomo/rule/}"
            name="${rel_path%.yaml}"
            output="Mihomo/rule/$name.mrs"

            mkdir -p "$(dirname "$output")"

            behavior=$(detect_behavior "$file")

            echo "[MRS] $name → $behavior"

            ./mihomo convert-ruleset "$behavior" yaml "$file" "$output"

          done

      ################################
      # 5️⃣ Providers
      ################################
      - name: Generate providers
        run: |
          get_behavior_by_name() {
            name="$1"
            if echo "$name" | grep -qE '_ip$'; then
              echo "ipcidr"
            else
              echo "domain"
            fi
          }

          providers_file="Mihomo/rule-providers.yaml"
          echo "rule-providers:" > "$providers_file"

          find Mihomo/rule -type f -name '*.mrs' | sort | while read -r file; do

            rel_path="${file#Mihomo/rule/}"
            name="${rel_path%.mrs}"
            base_name=$(basename "$name")

            behavior=$(get_behavior_by_name "$base_name")

            printf "  %s:\n" "$base_name" >> "$providers_file"
            printf "    type: http\n" >> "$providers_file"
            printf "    behavior: %s\n" "$behavior" >> "$providers_file"
            printf "    format: mrs\n" >> "$providers_file"

            printf \
            "    url: https://cdn.jsdelivr.net/gh/%s@main/Mihomo/rule/%s.mrs\n" \
            "$GITHUB_REPOSITORY" "$name" >> "$providers_file"

            printf "    path: ./ruleset/%s.mrs\n" "$base_name" >> "$providers_file"
            printf "    interval: 86400\n\n" >> "$providers_file"

          done

      ################################
      # 6️⃣ README
      ################################
      - name: Generate README
        run: |
          printf "%s\n" \
          "# 📦 Rule Pipeline（自动规则构建系统）" \
          "" \
          "本项目提供一套完整的规则构建流水线：" \
          "" \
          "> 引入 → 展开 → 归一化 → 去重 → 分类 → 多平台输出 → MRS → Providers" \
          "" \
          "---" \
          "" \
          "# 🚀 功能" \
          "" \
          "- 模块化规则管理（支持 include）" \
          "- 自动去重 / 排序 / 合并" \
          "- IP CIDR 聚合优化" \
          "- 多平台输出（Mihomo / QX / Egern）" \
          "- 自动生成 rule-providers" \
          "" \
          "---" \
          "" \
          "# 📂 目录结构" \
          "" \
          "\`\`\`" \
          "rules/                  # 原始规则" \
          "tmp/normalized/         # 中间产物" \
          "Mihomo/rule/            # Mihomo 输出" \
          "Quantumult X/rule/      # QX 输出" \
          "Egern/rule/             # Egern 输出" \
          "Surge/rule/             # Surge 输出" \
          "\`\`\`" \
          "" \
          "---" \
          "" \
          "# 🔁 引入语法" \
          "" \
          "推荐：" \
          "#!include: local.list" \
          "#!source: https://example.com/rules.list" \
          "" \
          "简洁：" \
          "@local.list" \
          "@https://example.com/rules.list" \
          "" \
          "## 📁 文件名合并规则（@ 分组机制）" \
          "" \
          "在子目录中，可以使用如下文件命名方式：" \
          "" \
          "\`\`\`" \
          "Direct@ex1.list" \
          "Direct@ex2.list" \
          "Proxy@streaming.list" \
          "\`\`\`" \
          "" \
          "系统会自动按 @ 前缀进行合并：" \
          "" \
          "\`\`\`" \
          "Direct@ex1.list + Direct@ex2.list → Direct.list" \
          "Proxy@streaming.list → Proxy.list" \
          "\`\`\`" \
          "" \
          "- 自动合并同名前缀规则" \
          "- 便于拆分维护大规则集" \
          "- 不影响目录结构" \
          "" \
          "### 💡 示例" \
          "" \
          "\`\`\`" \
          "rules/" \
          "  direct/" \
          "    Direct@base.list" \
          "    Direct@cn.list" \
          "\`\`\`" \
          "" \
          "生成：" \
          "" \
          "\`\`\`" \
          "Direct.list" \
          "\`\`\`" \
          "" \
          "⚠️ @ 仅用于文件名分组，不影响 include 语法" \
          "" \
          "---" \
          "" \
          "# 🔧 Normalize" \
          "" \
          "- 支持文本规则" \
          "- 支持 YAML（Clash / Mihomo）" \
          "- 自动转换 / 去重" \
          "" \
          "---" \
          "" \
          "# 🌐 IP 优化" \
          "" \
          "自动 CIDR 聚合" \
          "" \
          "---" \
          "" \
          "# 🧱 输出" \
          "" \
          "- Mihomo（YAML + MRS）" \
          "- Quantumult X" \
          "- Egern" \
          "- Surge" \
          "" \
          "---" \
          "" \
          "# ⚡ 自动化" \
          "" \
          "- push rules/** 自动触发" \
          "- 每日定时更新" \
          "" \
          "---" \
          "" \
          "# 🧠 说明" \
          "" \
          "本项目是一个规则编译系统。" \
          > README.md

      ################################
      #  Commit
      ################################
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "auto: full pipeline"

          git pull --rebase origin main
          git push
