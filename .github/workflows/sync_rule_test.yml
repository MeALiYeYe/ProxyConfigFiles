name: Sync_rule_test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'rules/**'

concurrency:
  group: rules-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      ################################
      # 1️⃣ Expand @includes (支持 @URL / 本地 @路径 / # include / # source)
      ################################
      - name: Expand @includes
        run: |
          set -e

          expand_file() {
            local file="$1"
            local tmp=$(mktemp)

            while IFS= read -r line || [ -n "$line" ]; do

              # @URL
              if [[ "$line" =~ ^@https?:// ]]; then
                url="${line#@}"
                echo "# source: $url"
                curl -L --retry 3 --connect-timeout 10 "$url" | awk '
                  BEGIN { yaml=0 }
                  /^payload:/ { yaml=1; next }
                  yaml==1 { sub(/^- /,""); print; next }
                  { print }
                '

              # 本地 @路径
              elif [[ "$line" =~ ^@ ]]; then
                path="${line#@}"
                path="$(dirname "$file")/$path"
                if [ -f "$path" ]; then
                  echo "# include: $path"
                  expand_file "$path"
                else
                  echo "Warning: local include $path not found" >&2
                fi

              # # include / # source
              elif [[ "$line" =~ ^#\ (include|source): ]]; then
                ref="${line#\#* }"
                if [[ "$ref" =~ ^https?:// ]]; then
                  echo "$line"
                  curl -L --retry 3 --connect-timeout 10 "$ref" | awk '
                    BEGIN { yaml=0 }
                    /^payload:/ { yaml=1; next }
                    yaml==1 { sub(/^- /,""); print; next }
                    { print }
                  '
                else
                  path="$(dirname "$file")/$ref"
                  if [ -f "$path" ]; then
                    echo "$line"
                    expand_file "$path"
                  else
                    echo "Warning: local include $path not found" >&2
                  fi

              # 普通行
              else
                echo "$line"
              fi

            done < "$file" > "$tmp"

            mv "$tmp" "$file"
          }

          export -f expand_file

          # 遍历 rules 下所有文件
          find rules -type f | while read -r file; do
            expand_file "$file"
          done

      ################################
      # 2️⃣ Normalize rules
      ################################
      - name: Normalize rules
        run: |
          set -e

          convert_yaml() {
            input="$1"
            output="$2"
            sed '1d' "$input" | sed 's/^- //' | while read -r line; do
              if echo "$line" | grep -qE '^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-WILDCARD|DOMAIN-REGEX|IP-CIDR|IP-CIDR6|GEOIP|PROTOCOL),'; then
                echo "$line"
              elif echo "$line" | grep -q '^\+\.'; then
                echo "DOMAIN-SUFFIX,${line#+.}"
              elif echo "$line" | grep -q '/'; then
                echo "IP-CIDR,$line"
              else
                echo "DOMAIN,$line"
              fi
            done > "$output"
          }

          normalize_file() {
            input="$1"
            output="$2"
            tmp_input=$(mktemp)
            sed '/^# source:/d' "$input" > "$tmp_input"

            if grep -q '^payload:' "$tmp_input"; then
              convert_yaml "$tmp_input" "$output"
            else
              sed '/^#/d;/^$/d' "$tmp_input" > "$output"
            fi

            rm -f "$tmp_input"
          }

          # 保留子目录结构
          find rules -type f ! -path "*/\.*" | while read -r file; do
            rel_path="${file#rules/}"
            dir_path=$(dirname "$rel_path")
            filename=$(basename "$file")
            base="${filename%%@*}"
            out="tmp/normalized/${dir_path}/${base}.list"
            mkdir -p "$(dirname "$out")"
            normalize_file "$file" "$out"
          done

      ################################
      # 3️⃣ Generate Mihomo / Quantumult X / Egern
      ################################
      - name: Generate rules
        run: |
          set -e
          mkdir -p Mihomo/rule Egern/rule "Quantumult X/rule"
          rm -rf Mihomo/rule/* Egern/rule/* "Quantumult X/rule"/*

          find tmp/normalized -type f -name '*.list' | while read -r file; do
            rel_path="${file#tmp/normalized/}"
            out_name="${rel_path%.list}"
            mkdir -p "Mihomo/rule/$(dirname "$out_name")" "Egern/rule/$(dirname "$out_name")" "Quantumult X/rule/$(dirname "$out_name")"

            tmp=$(mktemp)
            sed '/^#/d;/^$/d' "$file" | sort -u > "$tmp"

            # Mihomo domain/ip yaml
            mihomo_domain="Mihomo/rule/${out_name}.yaml"
            mihomo_ip="Mihomo/rule/${out_name}_ip.yaml"
            echo "payload:" > "$mihomo_domain"
            echo "payload:" > "$mihomo_ip"

            grep -E '^(DOMAIN|DOMAIN-SUFFIX),' "$tmp" | while IFS=',' read -r type value; do
              [[ "$type" == "DOMAIN-SUFFIX" ]] && echo "  - +.$value" >> "$mihomo_domain" || echo "  - $value" >> "$mihomo_domain"
            done

            grep -E '^(IP-CIDR|IP-CIDR6),' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$mihomo_ip"

            # Quantumult X
            cp "$tmp" "Quantumult X/rule/${out_name}.list"

            # Egern
            egern_out="Egern/rule/${out_name}.yaml"
            rm -f "$egern_out"
            for prefix in "DOMAIN-SUFFIX" "DOMAIN" "DOMAIN-KEYWORD" "DOMAIN-WILDCARD" "DOMAIN-REGEX" "IP-CIDR" "IP-CIDR6" "GEOIP" "PROTOCOL"; do
              if grep -q "^$prefix," "$tmp"; then
                key=$(echo "$prefix" | tr 'A-Z-' 'a-z_')
                echo "$key:" >> "$egern_out"
                grep "^$prefix," "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
              fi
            done
          done

      ################################
      # 4️⃣ Download Mihomo
      ################################
      - name: Download Mihomo
        run: |
          set -e
          VERSION="v1.19.24"
          FILE="mihomo-linux-amd64-${VERSION}.gz"
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/${FILE}"

          [ -x "./mihomo" ] && echo "Mihomo already exists" && ./mihomo -v && exit 0

          rm -f mihomo mihomo.gz
          curl -L --fail --retry 3 --connect-timeout 10 -o mihomo.gz "$URL"
          file mihomo.gz | grep -q gzip || (echo "Download failed" && exit 1)
          gunzip -f mihomo.gz
          chmod +x mihomo
          ./mihomo -v || true

      ################################
      # 5️⃣ Convert to MRS
      ################################
      - name: Convert to MRS
        run: |
          detect_behavior() {
            file="$1"
            first=$(grep -v '^payload:' "$file" | sed 's/^- //' | head -n 1)
            [[ "$first" =~ / ]] && echo "ipcidr" || echo "domain"
          }

          find Mihomo/rule -type f -name '*.yaml' | sort | while read -r file; do
            rel="${file#Mihomo/rule/}"
            name="${rel%.yaml}"
            mkdir -p "$(dirname "$file")"
            ./mihomo convert-ruleset "$(detect_behavior "$file")" yaml "$file" "Mihomo/rule/$name.mrs"
          done

      ################################
      # 6️⃣ Generate providers
      ################################
      - name: Generate providers
        run: |
          get_behavior() {
            [[ "$1" =~ _ip$ ]] && echo "ipcidr" || echo "domain"
          }

          providers_file="Mihomo/rule-providers.yaml"
          echo "rule-providers:" > "$providers_file"

          find Mihomo/rule -type f -name '*.mrs' | sort | while read -r file; do
            rel="${file#Mihomo/rule/}"
            name="${rel%.mrs}"
            behavior=$(get_behavior "$name")
            printf "  %s:\n    type: http\n    behavior: %s\n    format: mrs\n" "$name" "$behavior" >> "$providers_file"
            printf "    url: https://cdn.jsdelivr.net/gh/%s@main/Mihomo/rule/%s.mrs\n" "$GITHUB_REPOSITORY" "$name" >> "$providers_file"
            printf "    path: ./ruleset/%s.mrs\n    interval: 86400\n\n" "$name" >> "$providers_file"
          done
