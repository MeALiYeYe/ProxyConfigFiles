name: sync_cdn

on:
  schedule:
    - cron: '0 0 */30 * *' # 每30天北京时间早上 8 点自动运行
  workflow_dispatch: # 允许在 GitHub 网页上手动点击按钮触发

env:
  TARGET_DIR: "Mihomo/static"
  VERSION_FILE: "Mihomo/static/version.json"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Actions 向仓库提交代码的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Sync and Process Files
        run: |
          set -e

          # 确保目标目录存在
          mkdir -p "$TARGET_DIR"

          # =========================================================
          # 0. 初始化或读取本地版本记录
          # =========================================================
          if [ -f "$VERSION_FILE" ]; then
            LOCAL_MIHOMO_VER=$(jq -r '.mihomo // "none"' "$VERSION_FILE")
            LOCAL_DASH_VER=$(jq -r '.zashboard // "none"' "$VERSION_FILE")
          else
            LOCAL_MIHOMO_VER="none"
            LOCAL_DASH_VER="none"
            echo '{"mihomo": "none", "zashboard": "none"}' > "$VERSION_FILE"
          fi

          echo "本地已存版本 -> Mihomo: $LOCAL_MIHOMO_VER | Zashboard: $LOCAL_DASH_VER"

          # =========================================================
          # 1. 动态获取远程最新版本号
          # =========================================================
          echo "正在从 GitHub API 获取最新版本号..."
          LATEST_MIHOMO_VER=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r '.tag_name')
          LATEST_DASH_VER=$(curl -sL "https://api.github.com/repos/Zephyruso/zashboard/releases/latest" | jq -r '.tag_name')

          # 容错处理：避免网络抖动拿到空变量导致脚本异常
          if [ -z "$LATEST_MIHOMO_VER" ] || [ "$LATEST_MIHOMO_VER" = "null" ]; then
            echo "警告: 无法获取最新 Mihomo 版本，降级使用本地版本或默认值"
            LATEST_MIHOMO_VER=$LOCAL_MIHOMO_VER
          fi
          if [ -z "$LATEST_DASH_VER" ] || [ "$LATEST_DASH_VER" = "null" ]; then
            echo "警告: 无法获取最新 Zashboard 版本，降级使用本地版本或默认值"
            LATEST_DASH_VER=$LOCAL_DASH_VER
          fi

          echo "远程最新版本 -> Mihomo: $LATEST_MIHOMO_VER | Zashboard: $LATEST_DASH_VER"


          # =========================================================
          # 2. 处理 Mihomo 核心
          # ========================================================= 
          # 判断条件：如果本地有可执行文件且版本号一致，则跳过
          if [ -x "$TARGET_DIR/mihomo" ] && [ "$LOCAL_MIHOMO_VER" = "$LATEST_MIHOMO_VER" ] && [ "$LOCAL_MIHOMO_VER" != "none" ]; then
            echo "Mihomo 核心已是最新版 ($LATEST_MIHOMO_VER)，跳过下载。"
          else
            echo "开始下载最新版 Mihomo Core: $LATEST_MIHOMO_VER"
            MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_MIHOMO_VER}/mihomo-linux-amd64-${LATEST_MIHOMO_VER}.gz"
            
            rm -f mihomo.gz
            curl -L --fail --retry 3 --connect-timeout 10 -o mihomo.gz "$MIHOMO_URL"

            if ! file mihomo.gz | grep -q gzip; then
              echo "Error: Download failed (not a valid gzip file)"
              cat mihomo.gz | head -n 20
              exit 1
            fi

            gunzip -f mihomo.gz
            mv -f mihomo "$TARGET_DIR/mihomo"
            chmod +x "$TARGET_DIR/mihomo"
            
            # 更新内存中的 JSON 记录值
            jq ".mihomo = \"$LATEST_MIHOMO_VER\"" "$VERSION_FILE" > version.tmp && mv version.tmp "$VERSION_FILE"
            echo "Mihomo 核心更新成功！"
          fi


          # =========================================================
          # 3. 下载 Mihomo Smart 版 Model 文件
          # =========================================================
          MODEL_FILE="$TARGET_DIR/Model.bin"
          MODEL_URL="https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"

          if [ -f "$MODEL_FILE" ]; then
            echo "Model.bin 已存在，检查是否需要更新..."

            # 获取远程文件大小（轻量校验）
            REMOTE_SIZE=$(curl -sI "$MODEL_URL" | awk '/Content-Length/ {print $2}' | tr -d '\r')
            LOCAL_SIZE=$(stat -c%s "$MODEL_FILE" 2>/dev/null || echo 0)

            if [ "$REMOTE_SIZE" = "$LOCAL_SIZE" ] && [ -n "$REMOTE_SIZE" ]; then
              echo "Model.bin 已是最新版本，跳过下载。"
            else
              echo "检测到更新，重新下载 Model.bin..."
              curl -L --fail --retry 3 --connect-timeout 15 -o "$MODEL_FILE" "$MODEL_URL"
            fi
          else
            echo "Model.bin 不存在，开始下载..."
            curl -L --fail --retry 3 --connect-timeout 15 -o "$MODEL_FILE" "$MODEL_URL"
          fi


          # =========================================================
          # 4. 下载并解压 Zashboard 静态压缩包
          # =========================================================      
          ZIP_FILE="$TARGET_DIR/dist.zip"
          TMP_ZIP="$TARGET_DIR/dist.tmp.zip"

          # 确保目录存在（关键！）
          mkdir -p "$TARGET_DIR"

          if [ -f "$ZIP_FILE" ] && [ "$LOCAL_DASH_VER" = "$LATEST_DASH_VER" ] && [ "$LOCAL_DASH_VER" != "none" ]; then
            echo "Zashboard 面板已是最新版 ($LATEST_DASH_VER)，跳过下载。"
          else
            echo "开始下载最新版 Zashboard 面板: $LATEST_DASH_VER"

            DASHBOARD_URL="https://github.com/Zephyruso/zashboard/releases/download/${LATEST_DASH_VER}/dist-no-fonts.zip"

            rm -f "$TMP_ZIP"

            curl -L --fail --retry 3 --connect-timeout 15 \
              -o "$TMP_ZIP" "$DASHBOARD_URL"

            # 校验 zip
            if ! file "$TMP_ZIP" | grep -q 'Zip archive'; then
              echo "Error: Download failed (not a valid zip file)"
              rm -f "$TMP_ZIP"
              exit 1
            fi

            # 原子替换
            mv "$TMP_ZIP" "$ZIP_FILE"

            # 更新版本
            jq ".zashboard = \"$LATEST_DASH_VER\"" "$VERSION_FILE" > version.tmp \
              && mv version.tmp "$VERSION_FILE"

            echo "Zashboard 压缩包更新成功！"
          fi


          echo "========================================="
          echo "5. 检查最终目录状态"
          echo "========================================="
          cat "$VERSION_FILE"
          echo ""
          ls -lh "$TARGET_DIR"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 暂存目标目录的所有修改（包含更新后的旧文件和 version.json）
          git add "$TARGET_DIR/"

          # 检查是否有文件变更，有则提交，没有则跳过
          if git diff --staged --quiet; then
            echo "No changes detected. Repository is up-to-date."
          else
            # 动态获取最终记录在本地的版本，用于生成直观的 Commit 信息
            FINAL_MIHOMO=$(jq -r '.mihomo' "$VERSION_FILE")
            FINAL_DASH=$(jq -r '.zashboard' "$VERSION_FILE")
            
            git commit -m "Automated Sync: Core@${FINAL_MIHOMO} & Dash@${FINAL_DASH} [$(date -u +'%Y-%m-%d %H:%M:%S') UTC]"
            git push origin main
          fi
