name: Sync External Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync rules
        run: |

          set -e

          mkdir -p Surge/rule

          declare -A RULES=(
            ["fakeip"]="https://raw.githubusercontent.com/SunsetMkt/anti-ip-attribution/main/generated/surge.list"
          )

          changed=0

          for name in "${!RULES[@]}"; do

            url="${RULES[$name]}"

            # 保存路径：
            # Surge/rule/name/name.list
            dir="Surge/rule/$name"
            target="$dir/$name.list"

            mkdir -p "$dir"

            echo "Fetching $name..."
            echo "URL: $url"

            tmp=$(mktemp)

            curl -L \
              --retry 3 \
              --connect-timeout 10 \
              "$url" \
              -o "$tmp"

            # 自动兼容任意扩展名
            # 最终统一重命名为 name.list

            if [ -f "$target" ] && cmp -s "$target" "$tmp"; then

              echo "No change: $name"
              rm -f "$tmp"

            else

              mv "$tmp" "$target"

              echo "Updated: $target"

              changed=1

            fi

          done

          if [ "$changed" -eq 0 ]; then
            echo "No updates"
            exit 0
          fi

      - name: Commit changes
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Surge/rule

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "sync external rules"
          git push
