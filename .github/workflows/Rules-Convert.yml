name: Rules Pipeline (Production)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'Surge/rule/**'

concurrency:
  group: rules-pipeline
  cancel-in-progress: true

jobs:

################################
# 1️⃣ Sync 外部规则
################################
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}

    steps:
      - uses: actions/checkout@v5

      - name: Sync external rules
        id: sync
        run: |
          set -e

          mkdir -p Surge/rule

          declare -A RULES=(
            ["FakeLocation"]="https://raw.githubusercontent.com/SunsetMkt/anti-ip-attribution/main/generated/surge.list"
          )

          changed=0

          for name in "${!RULES[@]}"; do
            url="${RULES[$name]}"
            dir="Surge/rule/$name"
            target="$dir/$name.list"

            mkdir -p "$dir"

            tmp=$(mktemp)
            curl -L --retry 3 --connect-timeout 10 "$url" -o "$tmp"

            if [ -f "$target" ] && cmp -s "$target" "$tmp"; then
              rm -f "$tmp"
            else
              mv "$tmp" "$target"
              echo "Updated: $target"
              changed=1
            fi
          done

          echo "changed=$changed" >> $GITHUB_OUTPUT

      - name: Commit
        if: steps.sync.outputs.changed == '1'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Surge/rule
          git commit -m "sync external rules"
          git push

################################
# 2️⃣ 规则生成（核心）
################################
  generate:
    needs: sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate rules
        run: |
          set -e

          mkdir -p Mihomo/rule
          mkdir -p Egern/rule
          mkdir -p Quantumult\ X/rule

          total_rules=0

          while read -r file; do

            rel="${file#Surge/rule/}"
            name="${rel%.list}"

            tmp=$(mktemp)

            sed '/^#/d;/^$/d' "$file" | sort -u > "$tmp"

            sorted=$(mktemp)

            grep '^DOMAIN,' "$tmp" >> "$sorted" || true
            grep '^DOMAIN-SUFFIX,' "$tmp" >> "$sorted" || true
            grep '^DOMAIN-KEYWORD,' "$tmp" >> "$sorted" || true
            grep '^DOMAIN-WILDCARD,' "$tmp" >> "$sorted" || true

            ipv4=$(mktemp)
            ipv6=$(mktemp)

            grep '^IP-CIDR,' "$tmp" | cut -d',' -f2 > "$ipv4" || true
            grep '^IP-CIDR6,' "$tmp" | cut -d',' -f2 > "$ipv6" || true

            py=$(mktemp)

            printf '%s\n' \
            'import sys, ipaddress' \
            'mode=sys.argv[1];file=sys.argv[2]' \
            'nets=[ipaddress.ip_network(l.strip(),strict=False) for l in open(file) if l.strip()]' \
            'for n in sorted(ipaddress.collapse_addresses(nets)):' \
            ' print(("IP-CIDR," if mode=="v4" else "IP-CIDR6,")+str(n))' \
            > "$py"

            [ -s "$ipv4" ] && python3 "$py" v4 "$ipv4" >> "$sorted"
            [ -s "$ipv6" ] && python3 "$py" v6 "$ipv6" >> "$sorted"

            grep -Ev '^(DOMAIN|IP-CIDR)' "$tmp" >> "$sorted" || true

            mv "$sorted" "$tmp"

            ################################
            # Mihomo
            ################################
            d_out="Mihomo/rule/$name.yaml"
            i_out="Mihomo/rule/${name}_ip.yaml"

            mkdir -p "$(dirname "$d_out")"

            echo "payload:" > "$d_out"
            echo "payload:" > "$i_out"

            while IFS=',' read -r t v _; do
              [ "$t" = "DOMAIN" ] && echo "  - $v" >> "$d_out"
              [ "$t" = "DOMAIN-SUFFIX" ] && echo "  - +.$v" >> "$d_out"
            done < <(grep -E '^(DOMAIN|DOMAIN-SUFFIX),' "$tmp")

            grep -E '^(IP-CIDR|IP-CIDR6),' "$tmp" \
              | cut -d',' -f2 | sed 's/^/  - /' >> "$i_out"

            ################################
            # Quantumult X
            ################################
            qx="Quantumult X/rule/$name.list"
            mkdir -p "$(dirname "$qx")"
            cp "$tmp" "$qx"

            ################################
            # Egern（简化稳定版）
            ################################
            eg="Egern/rule/$name.yaml"
            mkdir -p "$(dirname "$eg")"
            rm -f "$eg"

            if grep -q '^DOMAIN-SUFFIX,' "$tmp"; then
              echo "domain_suffix_set:" >> "$eg"
              grep '^DOMAIN-SUFFIX,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$eg"
            fi

            count=$(wc -l < "$tmp")
            total_rules=$((total_rules + count))

          done < <(find Surge/rule -name '*.list')

          echo "Total rules: $total_rules"

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Mihomo/rule
          git add Egern/rule
          git add Quantumult\ X/rule

          git diff --cached --quiet && exit 0

          git commit -m "generate rules"
          git push

################################
# 3️⃣ MRS + Providers + Stats
################################
  mrs:
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download Mihomo
        run: |
          curl -L -o mihomo.gz \
          https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.gz
          gunzip mihomo.gz
          chmod +x mihomo

      - name: Convert MRS
        run: |
          find Mihomo/rule -name '*.yaml' | while read -r f; do
            out="${f%.yaml}.mrs"
            ./mihomo convert-ruleset domain yaml "$f" "$out" || true
          done

      - name: Generate Providers
        run: |
          file="Mihomo/rule-providers.yaml"
          echo "rule-providers:" > "$file"

          while read -r f; do
            n=$(basename "$f" .mrs)

            printf "  %s:\n" "$n" >> "$file"
            printf "    type: http\n" >> "$file"
            printf "    behavior: domain\n" >> "$file"
            printf "    format: mrs\n" >> "$file"
            printf "    url: https://cdn.jsdelivr.net/gh/%s@main/%s\n" "$GITHUB_REPOSITORY" "$f" >> "$file"
            printf "    path: ./ruleset/%s.mrs\n" "$n" >> "$file"
            printf "    interval: 86400\n\n" >> "$file"

          done < <(find Mihomo/rule -name '*.mrs')

      - name: Generate Stats Page
        run: |
          mkdir -p docs

          echo "<h1>Proxy Rules Stats</h1>" > docs/index.html
          echo "<p>Updated: $(date)</p>" >> docs/index.html

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Mihomo
          git add docs

          git diff --cached --quiet && exit 0

          git commit -m "mrs + providers + stats"
          git push
