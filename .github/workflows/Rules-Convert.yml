name: Rules-Convert

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'Surge/rule/**'
      - 'Mihomo/rule/**.yaml'

concurrency:
  group: rules-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      ################################
      # 1️⃣ Sync External Rules
      ################################
      - name: Sync rules
        run: |
          set -e

          mkdir -p Surge/rule

          declare -A RULES=(
            ["FakeLocation"]="https://raw.githubusercontent.com/SunsetMkt/anti-ip-attribution/main/generated/surge.list"
          )

          changed=0

          for name in "${!RULES[@]}"; do

            url="${RULES[$name]}"
            dir="Surge/rule/$name"
            target="$dir/$name.list"

            mkdir -p "$dir"

            echo "Fetching $name..."
            tmp=$(mktemp)

            curl -L \
              --retry 3 \
              --connect-timeout 10 \
              "$url" \
              -o "$tmp"

            if [ -f "$target" ] && cmp -s "$target" "$tmp"; then
              echo "No change: $name"
              rm -f "$tmp"
            else
              mv "$tmp" "$target"
              echo "Updated: $target"
              changed=1
            fi

          done

          if [ "$changed" -eq 0 ]; then
            echo "No updates"
          fi

      ################################
      # 2️⃣ Generate Rules
      ################################
      - name: Generate rules
        run: |
          set -e

          mkdir -p Mihomo/rule
          mkdir -p Egern/rule
          mkdir -p "Quantumult X/rule"

          total_rules=0

          while read -r file; do

            rel_path="${file#Surge/rule/}"
            name="${rel_path%.list}"

            tmp=$(mktemp)

            echo "Processing $name"

            sed '/^#/d;/^$/d' "$file" | sort -u > "$tmp"

            sorted=$(mktemp)

            grep '^DOMAIN,' "$tmp" | sort -u >> "$sorted" || true
            grep '^DOMAIN-SUFFIX,' "$tmp" | sort -u >> "$sorted" || true
            grep '^DOMAIN-KEYWORD,' "$tmp" | sort -u >> "$sorted" || true
            grep '^DOMAIN-WILDCARD,' "$tmp" | sort -u >> "$sorted" || true

            ipv4_tmp=$(mktemp)
            ipv6_tmp=$(mktemp)

            grep '^IP-CIDR,' "$tmp" | cut -d',' -f2 > "$ipv4_tmp" || true
            grep '^IP-CIDR6,' "$tmp" | cut -d',' -f2 > "$ipv6_tmp" || true

            py_script=$(mktemp)

            printf '%s\n' \
            'import sys, ipaddress' \
            '' \
            'mode = sys.argv[1]' \
            'file = sys.argv[2]' \
            '' \
            'with open(file) as f:' \
            '    nets = [ipaddress.ip_network(line.strip(), strict=False) for line in f if line.strip()]' \
            '' \
            'collapsed = sorted(ipaddress.collapse_addresses(nets))' \
            '' \
            'if mode == "ipv4":' \
            '    for net in collapsed:' \
            '        if net.version == 4:' \
            '            print(f"IP-CIDR,{net}")' \
            'elif mode == "ipv6":' \
            '    for net in collapsed:' \
            '        if net.version == 6:' \
            '            print(f"IP-CIDR6,{net}")' \
            > "$py_script"

            if [ -s "$ipv4_tmp" ]; then
              python3 "$py_script" ipv4 "$ipv4_tmp" >> "$sorted"
            fi

            if [ -s "$ipv6_tmp" ]; then
              python3 "$py_script" ipv6 "$ipv6_tmp" >> "$sorted"
            fi

            rm -f "$ipv4_tmp" "$ipv6_tmp" "$py_script"

            grep -Ev '^(DOMAIN|IP-CIDR)' "$tmp" >> "$sorted" || true

            mv "$sorted" "$tmp"

            count=$(wc -l < "$tmp")
            total_rules=$((total_rules + count))

            domain_count=$(grep -Ec '^(DOMAIN|DOMAIN-SUFFIX),' "$tmp" || true)
            ip_count=$(grep -Ec '^(IP-CIDR|IP-CIDR6),' "$tmp" || true)

            echo "$name total: $count (domain: $domain_count / ip: $ip_count)"

            ################################
            # Mihomo
            ################################

            mihomo_domain_out="Mihomo/rule/$name.yaml"
            mihomo_ip_out="Mihomo/rule/${name}_ip.yaml"

            mkdir -p "$(dirname "$mihomo_domain_out")"
            mkdir -p "$(dirname "$mihomo_ip_out")"

            echo "payload:" > "$mihomo_domain_out"
            echo "payload:" > "$mihomo_ip_out"

            grep -E '^(DOMAIN|DOMAIN-SUFFIX),' "$tmp" | while IFS=',' read -r type value extra; do
              case "$type" in
                DOMAIN-SUFFIX)
                  echo "  - +.$value" >> "$mihomo_domain_out"
                  ;;
                DOMAIN)
                  echo "  - $value" >> "$mihomo_domain_out"
                  ;;
              esac
            done

            grep -E '^(IP-CIDR|IP-CIDR6),' "$tmp" \
            | cut -d',' -f2 \
            | sed 's/^/  - /' >> "$mihomo_ip_out"

            if [ $(wc -l < "$mihomo_domain_out") -le 1 ]; then rm -f "$mihomo_domain_out"; fi
            if [ $(wc -l < "$mihomo_ip_out") -le 1 ]; then rm -f "$mihomo_ip_out"; fi

            ################################
            # Quantumult X
            ################################

            qx_out="Quantumult X/rule/$name.list"
            mkdir -p "$(dirname "$qx_out")"
            cp "$tmp" "$qx_out"

            ################################
            # Egern
            ################################

            egern_out="Egern/rule/$name.yaml"
            mkdir -p "$(dirname "$egern_out")"
            rm -f "$egern_out"

            if grep -qE '^IP-CIDR,|^IP-CIDR6,|^GEOIP,' "$tmp"; then
              echo "no_resolve: true" >> "$egern_out"
            fi

            if grep -q '^DOMAIN-SUFFIX,' "$tmp"; then
              echo "domain_suffix_set:" >> "$egern_out"
              grep '^DOMAIN-SUFFIX,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN,' "$tmp"; then
              echo "domain_set:" >> "$egern_out"
              grep '^DOMAIN,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN-KEYWORD,' "$tmp"; then
              echo "domain_keyword_set:" >> "$egern_out"
              grep '^DOMAIN-KEYWORD,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN-WILDCARD,' "$tmp"; then
              echo "domain_wildcard_set:" >> "$egern_out"
              grep '^DOMAIN-WILDCARD,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^DOMAIN-REGEX,' "$tmp"; then
              echo "domain_regex_set:" >> "$egern_out"
              grep '^DOMAIN-REGEX,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^IP-CIDR,' "$tmp"; then
              echo "ip_cidr_set:" >> "$egern_out"
              grep '^IP-CIDR,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^IP-CIDR6,' "$tmp"; then
              echo "ip_cidr6_set:" >> "$egern_out"
              grep '^IP-CIDR6,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^GEOIP,' "$tmp"; then
              echo "geoip_set:" >> "$egern_out"
              grep '^GEOIP,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

            if grep -q '^PROTOCOL,' "$tmp"; then
              echo "protocol_set:" >> "$egern_out"
              grep '^PROTOCOL,' "$tmp" | cut -d',' -f2 | sed 's/^/  - /' >> "$egern_out"
            fi

          done < <(find Surge/rule -type f -name '*.list')

      ################################
      # 3️⃣ Download Mihomo
      ################################
      - name: Download Mihomo
        run: |
          set -e

          VERSION="v1.19.24"
          FILE="mihomo-linux-amd64-${VERSION}.gz"
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/${FILE}"

          # 如果已存在且可执行，则跳过
          if [ -x "./mihomo" ]; then
            echo "Mihomo already exists, skip download"
            ./mihomo -v || true
            exit 0
          fi

          echo "Downloading Mihomo..."

          # 清理异常残留（关键）
          rm -f mihomo mihomo.gz

          curl -L --fail --retry 3 --connect-timeout 10 -o mihomo.gz "$URL"

          # 校验 gzip（防止下载到 HTML）
          if ! file mihomo.gz | grep -q gzip; then
            echo "Download failed (not gzip)"
            cat mihomo.gz
            exit 1
          fi

          gunzip -f mihomo.gz
          chmod +x mihomo

          echo "Mihomo ready:"
          ./mihomo -v || true

      ################################
      # 4️⃣ YAML → MRS
      ################################
      - name: Convert to MRS
        run: |
          detect_behavior() {
            file="$1"
            first=$(grep -v '^payload:' "$file" | sed 's/^- //' | head -n 1)

            if echo "$first" | grep -q '/'; then
              echo "ipcidr"
            else
              echo "domain"
            fi
          }

          find Mihomo/rule -type f -name '*.yaml' | sort | while read -r file; do

            rel_path="${file#Mihomo/rule/}"
            name="${rel_path%.yaml}"
            output="Mihomo/rule/$name.mrs"

            mkdir -p "$(dirname "$output")"

            behavior=$(detect_behavior "$file")

            echo "[MRS] $name → $behavior"

            ./mihomo convert-ruleset "$behavior" yaml "$file" "$output"

          done

      ################################
      # 5️⃣ Providers
      ################################
      - name: Generate providers
        run: |
          get_behavior_by_name() {
            name="$1"
            if echo "$name" | grep -qE '_ip$'; then
              echo "ipcidr"
            else
              echo "domain"
            fi
          }

          providers_file="Mihomo/rule-providers.yaml"
          echo "rule-providers:" > "$providers_file"

          find Mihomo/rule -type f -name '*.mrs' | sort | while read -r file; do

            rel_path="${file#Mihomo/rule/}"
            name="${rel_path%.mrs}"
            base_name=$(basename "$name")

            behavior=$(get_behavior_by_name "$base_name")

            printf "  %s:\n" "$base_name" >> "$providers_file"
            printf "    type: http\n" >> "$providers_file"
            printf "    behavior: %s\n" "$behavior" >> "$providers_file"
            printf "    format: mrs\n" >> "$providers_file"

            printf \
            "    url: https://cdn.jsdelivr.net/gh/%s@main/Mihomo/rule/%s.mrs\n" \
            "$GITHUB_REPOSITORY" "$name" >> "$providers_file"

            printf "    path: ./ruleset/%s.mrs\n" "$base_name" >> "$providers_file"
            printf "    interval: 86400\n\n" >> "$providers_file"

          done

      ################################
      # 6️⃣ Commit
      ################################
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "auto: full pipeline"

          git pull --rebase origin main
          git push
