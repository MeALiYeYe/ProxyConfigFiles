name: Generate MRS + Stats

on:
  push:
    paths:
      - 'Mihomo/rule/**.yaml'
      - 'Surge/rule/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    ################################
    # 下载 Mihomo
    ################################
    - name: Download Mihomo
      run: |
        set -e
        MIHOMO_VERSION=v1.19.24

        curl -L -o mihomo.gz \
        https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz

        gunzip mihomo.gz
        chmod +x mihomo

    ################################
    # YAML → MRS
    ################################
    - name: Convert to MRS
      run: |

        detect_behavior() {
          file="$1"
          first=$(grep -v '^payload:' "$file" | sed 's/^- //' | head -n 1)

          if echo "$first" | grep -q '/'; then
            echo "ipcidr"
          else
            echo "domain"
          fi
        }

        for file in Mihomo/rule/*.yaml; do
          [ -f "$file" ] || continue

          name=$(basename "$file" .yaml)
          output="Mihomo/rule/$name.mrs"

          behavior=$(detect_behavior "$file")

          echo "[MRS] $name → $behavior"

          ./mihomo convert-ruleset $behavior yaml "$file" "$output"
        done

    ################################
    # providers.yaml（无 heredoc）
    ################################
    - name: Generate providers
      run: |

        providers_file="Mihomo/providers.yaml"
        echo "rule-providers:" > "$providers_file"

        for file in Mihomo/rule/*.mrs; do
          [ -f "$file" ] || continue

          name=$(basename "$file" .mrs)

          if grep -q '/' "Mihomo/rule/$name.yaml"; then
            behavior="ipcidr"
          else
            behavior="domain"
          fi

          printf "  %s:\n" "$name" >> "$providers_file"
          printf "    type: http\n" >> "$providers_file"
          printf "    behavior: %s\n" "$behavior" >> "$providers_file"
          printf "    format: mrs\n" >> "$providers_file"
          printf "    url: https://cdn.jsdelivr.net/gh/%s@main/Mihomo/rule/%s.mrs\n" "$GITHUB_REPOSITORY" "$name" >> "$providers_file"
          printf "    path: ./ruleset/%s.mrs\n" "$name" >> "$providers_file"
          printf "    interval: 86400\n\n" >> "$providers_file"

        done

    ################################
    # stats（无 heredoc）
    ################################
    - name: Generate stats
      run: |

        mkdir -p docs
        json_tmp=$(mktemp)

        echo "{" > "$json_tmp"
        first=1

        for file in Surge/rule/*.list; do
          [ -f "$file" ] || continue

          name=$(basename "$file" .list)

          total=$(grep -v '^#' "$file" | grep -v '^$' | wc -l)
          domain=$(grep -Ec '^(DOMAIN|DOMAIN-SUFFIX),' "$file" || true)
          ip=$(grep -Ec '^(IP-CIDR|IP-CIDR6),' "$file" || true)

          if [ $first -eq 0 ]; then echo "," >> "$json_tmp"; fi
          first=0

          printf "\"%s\": {\"total\": %s, \"domain\": %s, \"ip\": %s}" \
          "$name" "$total" "$domain" "$ip" >> "$json_tmp"
        done

        echo "}" >> "$json_tmp"

        {
          echo "<!DOCTYPE html>"
          echo "<html><head><meta charset=\"UTF-8\">"
          echo "<title>Proxy Rules Stats</title>"
          echo "<script src=\"https://cdn.jsdelivr.net/npm/chart.js\"></script>"
          echo "</head><body>"
          echo "<h1>Proxy Rules Statistics</h1>"
          echo "<p>Last updated: $(date)</p>"
          echo "<canvas id=\"chart\"></canvas>"
          echo "<script>"
          echo "const data = $(cat "$json_tmp");"
          echo "const labels = Object.keys(data);"
          echo "const totals = labels.map(k => data[k].total);"
          echo "new Chart(document.getElementById('chart'), {"
          echo "type: 'bar',"
          echo "data: { labels: labels, datasets: [{ label: 'Total', data: totals }] }"
          echo "});"
          echo "</script></body></html>"
        } > docs/index.html

        rm -f "$json_tmp"

    ################################
    # commit
    ################################
    - name: Commit
      run: |

        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add Mihomo/rule/*.mrs
        git add Mihomo/providers.yaml
        git add docs/index.html

        git diff --cached --quiet && echo "No changes" && exit 0

        git commit -m "auto: mrs + providers + stats"
        git push
